<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪢 Cabo de Guerra — Batalha de Calculadoras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  #header {
    background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #FFD600;
    flex-shrink: 0;
    gap: 8px;
  }

  .placar-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 6px 14px;
    border: 2px solid rgba(255,255,255,0.15);
  }

  .placar-eq {
    font-size: clamp(1.1rem, 2.5vw, 1.8rem);
    font-weight: 900;
    letter-spacing: 1px;
  }
  .placar-eq.azul    { color: #42A5F5; text-shadow: 0 0 12px #42A5F5; }
  .placar-eq.vermelho{ color: #EF5350; text-shadow: 0 0 12px #EF5350; }

  #timer-box {
    background: rgba(255,214,0,0.15);
    border: 2px solid #FFD600;
    border-radius: 12px;
    padding: 6px 18px;
    text-align: center;
  }
  #timer-label { color: #aaa; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; }
  #timer { font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 900; color: #FFD600; font-variant-numeric: tabular-nums; line-height: 1; }
  #timer.urgente { color: #EF5350; animation: pulsa 0.5s infinite; }

  #rodada-box { color: #aaa; font-size: 0.8rem; text-align: center; }
  #rodada-box span { display: block; color: white; font-size: 1rem; font-weight: 700; }

  @keyframes pulsa { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

  /* ===== PROGRESS ===== */
  #progress-bar { height: 5px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  #progress-fill { height: 100%; background: linear-gradient(90deg,#FFD600,#FF8F00); transition: width 1s linear; }

  /* ===== PERGUNTA ===== */
  #pergunta-area {
    background: linear-gradient(135deg, #FFD600, #FF8F00);
    padding: 10px 20px;
    text-align: center;
    flex-shrink: 0;
    border-bottom: 3px solid rgba(0,0,0,0.3);
  }
  #pergunta-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(0,0,0,0.5); font-weight: 600; }
  #pergunta-texto {
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    font-weight: 900;
    color: #1a1a2e;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  /* ===== ARENA PRINCIPAL ===== */
  #arena {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1.4fr 1fr;
    min-height: 0;
  }

  /* ===== PAINEL LATERAL (CALCULADORA) ===== */
  .painel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 10px 10px 10px;
    gap: 8px;
  }
  .painel.azul    { background: linear-gradient(160deg,#0d47a1,#1565C0); }
  .painel.vermelho{ background: linear-gradient(160deg,#b71c1c,#C62828); }
  .painel.brilho-azul    { background: linear-gradient(160deg,#1565C0,#42A5F5); }
  .painel.brilho-vermelho{ background: linear-gradient(160deg,#C62828,#EF5350); }

  .nome-equipe {
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    font-weight: 900;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    letter-spacing: 1px;
    text-align: center;
  }

  /* ===== CALCULADORA ===== */
  .calc-display {
    width: 100%;
    max-width: 240px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: right;
    border: 2px solid rgba(255,255,255,0.2);
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }
  .calc-valor  { font-size: clamp(1.4rem,2.5vw,2rem); font-weight: 900; color: white; font-variant-numeric: tabular-nums; }
  .calc-status { font-size: 1.2rem; min-width: 28px; text-align: center; }

  .calc-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 5px;
    width: 100%;
    max-width: 240px;
  }

  .btn-num {
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    color: white;
    font-size: clamp(1rem,2.2vw,1.5rem);
    font-weight: 800;
    cursor: pointer;
    aspect-ratio: 1.2;
    transition: all 0.12s;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-num:active, .btn-num.pressed { background: rgba(255,255,255,0.4); transform: scale(0.93); }
  .btn-del { background: rgba(255,100,100,0.3); border-color: rgba(255,100,100,0.5); font-size: clamp(0.8rem,1.5vw,1.1rem); }
  .btn-ok {
    grid-column: 1 / -1;
    background: #FFD600; border: 2px solid #FF8F00; border-radius: 10px;
    color: #1a1a2e; font-size: clamp(0.9rem,1.8vw,1.2rem); font-weight: 900;
    cursor: pointer; padding: 9px; transition: all 0.12s; touch-action: manipulation; letter-spacing: 1px;
  }
  .btn-ok:active, .btn-ok.pressed { background: #FF8F00; transform: scale(0.97); }

  .calc-display.correto { border-color: #69F0AE !important; box-shadow: 0 0 12px #69F0AE; }
  .calc-display.errado  { border-color: #EF5350 !important; box-shadow: 0 0 12px #EF5350; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  /* ===== CENTRO (CABO DE GUERRA) ===== */
  #centro {
    background: linear-gradient(180deg, #0a0a1a 0%, #111130 50%, #0a0a1a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-left: 3px solid rgba(255,255,255,0.08);
    border-right: 3px solid rgba(255,255,255,0.08);
    gap: 0;
  }

  /* Chão */
  #centro::after {
    content: '';
    position: absolute;
    bottom: 28%;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, rgba(66,165,245,0.4), rgba(255,214,0,0.6), rgba(239,83,80,0.4));
    border-radius: 2px;
  }

  /* ===== CENA DO CABO ===== */
  #cena-cabo {
    width: 100%;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 60%;
    padding-bottom: 4%;
  }

  /* Boneco SVG */
  .boneco-svg {
    flex-shrink: 0;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    transition: transform 0.3s;
  }

  /* Corda SVG que conecta os bonecos */
  #corda-svg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* Bandeira central */
  #bandeira {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(1.4rem, 3vw, 2rem);
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    transition: left 0.5s cubic-bezier(.34,1.56,.64,1);
    z-index: 10;
    pointer-events: none;
  }

  /* ===== PLACAR CENTRAL ===== */
  #placar-centro {
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,214,0,0.4);
    border-radius: 20px;
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 5;
  }
  .pc-num { font-size: clamp(1.6rem,3.5vw,2.4rem); font-weight: 900; }
  .pc-num.az  { color: #42A5F5; text-shadow: 0 0 10px #42A5F5; }
  .pc-num.vm  { color: #EF5350; text-shadow: 0 0 10px #EF5350; }
  .pc-sep { color: #aaa; font-size: 1.3rem; font-weight: 300; }

  /* barra de tensão da corda */
  #barra-tensao {
    width: 80%;
    max-width: 200px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  #tensao-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #42A5F5, #FFD600, #EF5350);
    transition: all 0.5s ease;
    transform-origin: center;
  }

  /* ===== FEEDBACK FLASH ===== */
  .feedback-flash { position: fixed; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:50; opacity:0; transition:opacity 0.15s; }
  .feedback-flash.acerto-azul    { background: radial-gradient(ellipse at 20% 50%,rgba(66,165,245,0.4),transparent 70%); }
  .feedback-flash.acerto-vermelho{ background: radial-gradient(ellipse at 80% 50%,rgba(239,83,80,0.4),transparent 70%); }
  .feedback-flash.visible { opacity:1; }

  /* ===== MSG RODADA ===== */
  #msg-rodada {
    position: fixed; top:50%; left:50%;
    transform: translate(-50%,-50%) scale(0.5);
    background: rgba(0,0,0,0.92); border: 3px solid #FFD600;
    border-radius: 20px; padding: 20px 36px; text-align: center;
    z-index:100; opacity:0; pointer-events:none;
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    max-width: 90vw;
  }
  #msg-rodada.visivel { opacity:1; transform: translate(-50%,-50%) scale(1); }
  #msg-rodada .emoji  { font-size:3rem; display:block; margin-bottom:6px; }
  #msg-rodada .titulo { font-size: clamp(1.2rem,3vw,1.8rem); font-weight:900; color:#FFD600; }
  #msg-rodada .sub    { font-size: clamp(0.9rem,2vw,1.1rem); color:#aaa; margin-top:4px; }

  /* ===== FIM DE JOGO ===== */
  #fim-jogo {
    display:none; position:fixed; inset:0; z-index:200;
    flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:30px;
  }
  #fim-jogo.azul-venceu    { background: linear-gradient(135deg,#0d47a1,#1565C0,#42A5F5); }
  #fim-jogo.vermelho-venceu{ background: linear-gradient(135deg,#b71c1c,#C62828,#EF5350); }
  #fim-jogo.empate         { background: linear-gradient(135deg,#1a1a2e,#2d2d5e); }
  #fim-jogo .trofeu        { font-size: clamp(4rem,12vw,8rem); animation: pula 0.5s ease-in-out infinite alternate; }
  #fim-jogo .vencedor-nome { font-size: clamp(2rem,6vw,4rem); font-weight:900; color:white; text-shadow:0 4px 20px rgba(0,0,0,.5); margin:10px 0; }
  #fim-jogo .placar-final  { font-size: clamp(1.2rem,3vw,2rem); color:rgba(255,255,255,.85); margin:8px 0; }
  #fim-jogo .confetes      { font-size:2rem; animation: chuva 1s linear infinite; }
  @keyframes pula  { from{transform:translateY(0) rotate(-5deg);} to{transform:translateY(-20px) rotate(5deg);} }
  @keyframes chuva { 0%{letter-spacing:2px;opacity:1;} 100%{letter-spacing:20px;opacity:0;} }

  #btn-reiniciar {
    margin-top:20px; background:#FFD600; border:none; border-radius:14px;
    padding:14px 40px; font-size: clamp(1rem,2.5vw,1.4rem); font-weight:900;
    color:#1a1a2e; cursor:pointer; letter-spacing:1px; transition:transform .12s;
    touch-action:manipulation;
  }
  #btn-reiniciar:active { transform: scale(0.95); }

  /* estrelas */
  .estrelas { display:flex; gap:3px; justify-content:center; }
  .estrela { font-size: clamp(0.7rem,1.3vw,1rem); opacity:0.3; transition:opacity .3s,transform .3s; }
  .estrela.ativa { opacity:1; transform:scale(1.15); filter:drop-shadow(0 0 4px #FFD600); }

  @keyframes ponto-ganho { 0%{transform:scale(1);} 30%{transform:scale(1.3) rotate(5deg);} 60%{transform:scale(.9);} 100%{transform:scale(1);} }
  .ponto-animado { animation: ponto-ganho .5s ease-out; }

  /* badge voador */
  .badge-acertou {
    position:fixed; font-size: clamp(1rem,2.5vw,1.6rem); font-weight:900;
    background:#69F0AE; color:#1a1a2e; border-radius:12px; padding:8px 20px;
    z-index:60; pointer-events:none;
    animation: badge-fly 1.2s ease-out forwards; white-space:nowrap;
  }
  @keyframes badge-fly { 0%{opacity:1;transform:translateY(0) scale(1);} 60%{opacity:1;transform:translateY(-50px) scale(1.1);} 100%{opacity:0;transform:translateY(-100px) scale(.9);} }

  /* animação de puxar */
  @keyframes puxar-esq {
    0%,100%{ transform: rotate(-6deg) translateX(-2px); }
    50%    { transform: rotate(-2deg) translateX(3px); }
  }
  @keyframes puxar-dir {
    0%,100%{ transform: scaleX(-1) rotate(-6deg) translateX(-2px); }
    50%    { transform: scaleX(-1) rotate(-2deg) translateX(3px); }
  }
  .puxando-esq { animation: puxar-esq 0.8s ease-in-out infinite; }
  .puxando-dir { animation: puxar-dir 0.8s ease-in-out infinite; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="placar-box">
    <div>
      <div style="color:#aaa;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;">Equipe 1</div>
      <div class="placar-eq azul" id="pts1">0</div>
    </div>
    <div class="estrelas" id="estrelas1"></div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div id="timer-box">
      <div id="timer-label">Tempo</div>
      <div id="timer">30</div>
    </div>
    <div id="rodada-box">Rodada <span id="rodada-num">1</span>/10</div>
  </div>

  <div class="placar-box">
    <div class="estrelas" id="estrelas2"></div>
    <div style="text-align:right;">
      <div style="color:#aaa;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;text-align:right;">Equipe 2</div>
      <div class="placar-eq vermelho" id="pts2">0</div>
    </div>
  </div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-bar"><div id="progress-fill" style="width:100%"></div></div>

<!-- PERGUNTA -->
<div id="pergunta-area">
  <div id="pergunta-label">⚡ Responda primeiro e puxe a corda! ⚡</div>
  <div id="pergunta-texto">Carregando...</div>
</div>

<!-- ARENA -->
<div id="arena">

  <!-- CALCULADORA EQUIPE 1 -->
  <div class="painel azul" id="painel1">
    <div class="nome-equipe">🔵 EQUIPE 1</div>
    <div class="estrelas" id="estrelas1b"></div>
    <div class="calc-display" id="display1">
      <span class="calc-status" id="status1"></span>
      <span class="calc-valor"  id="valor1">_</span>
    </div>
    <div class="calc-grid" id="grid1"></div>
  </div>

  <!-- CENTRO: BONEQUINHOS + CORDA -->
  <div id="centro">

    <!-- Bandeira da posição -->
    <div id="bandeira">🚩</div>

    <!-- Cena do cabo de guerra -->
    <div id="cena-cabo">

      <!-- SVG da corda (atrás dos bonecos) -->
      <svg id="corda-svg" preserveAspectRatio="none" viewBox="0 0 400 200">
        <defs>
          <linearGradient id="cordaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   style="stop-color:#42A5F5;stop-opacity:1"/>
            <stop offset="50%"  style="stop-color:#D4A017;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1"/>
          </linearGradient>
          <!-- textura da corda -->
          <filter id="corda-tex">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <!-- Corda principal -->
        <path id="corda-path"
          d="M 30,150 C 80,140 120,160 200,150 C 280,140 320,160 370,150"
          stroke="url(#cordaGrad)" stroke-width="8" fill="none"
          stroke-linecap="round" filter="url(#corda-tex)"
          opacity="0.95"/>
        <!-- Sombra da corda -->
        <path id="corda-sombra"
          d="M 30,155 C 80,145 120,165 200,155 C 280,145 320,165 370,155"
          stroke="rgba(0,0,0,0.4)" stroke-width="6" fill="none"
          stroke-linecap="round"/>
        <!-- Nó central na corda -->
        <circle id="no-corda" cx="200" cy="150" r="7" fill="#FFD600" stroke="#FF8F00" stroke-width="2"/>
      </svg>

      <!-- Bonecos Equipe 1 (lado esquerdo, puxando para a esquerda) -->
      <svg class="boneco-svg puxando-esq" id="boneco1a" width="48" height="72"
           viewBox="0 0 60 90" style="position:absolute;bottom:22%;left:5%;">
        <circle cx="30" cy="10" r="9" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
        <line x1="30" y1="19" x2="30" y2="52" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <!-- Braço estendido para a direita (segurando corda) -->
        <line x1="30" y1="28" x2="54" y2="36" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <!-- Braço para trás -->
        <line x1="30" y1="28" x2="10" y2="24" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="16" y2="78" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="42" y2="78" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
      </svg>

      <svg class="boneco-svg puxando-esq" id="boneco1b" width="42" height="64"
           viewBox="0 0 60 90" style="position:absolute;bottom:22%;left:18%;animation-delay:0.2s;">
        <circle cx="30" cy="10" r="9" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
        <line x1="30" y1="19" x2="30" y2="52" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="54" y2="36" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="10" y2="24" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="16" y2="78" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="42" y2="78" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
      </svg>

      <svg class="boneco-svg puxando-esq" id="boneco1c" width="38" height="58"
           viewBox="0 0 60 90" style="position:absolute;bottom:22%;left:29%;animation-delay:0.4s;">
        <circle cx="30" cy="10" r="9" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
        <line x1="30" y1="19" x2="30" y2="52" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="54" y2="36" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="10" y2="24" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="16" y2="78" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="42" y2="78" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
      </svg>

      <!-- Bonecos Equipe 2 (lado direito, espelhados, puxando para direita) -->
      <svg class="boneco-svg puxando-dir" id="boneco2a" width="48" height="72"
           viewBox="0 0 60 90" style="position:absolute;bottom:22%;right:5%;">
        <circle cx="30" cy="10" r="9" fill="#EF5350" stroke="#C62828" stroke-width="2"/>
        <line x1="30" y1="19" x2="30" y2="52" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="54" y2="36" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="10" y2="24" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="16" y2="78" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="42" y2="78" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
      </svg>

      <svg class="boneco-svg puxando-dir" id="boneco2b" width="42" height="64"
           viewBox="0 0 60 90" style="position:absolute;bottom:22%;right:18%;animation-delay:0.2s;">
        <circle cx="30" cy="10" r="9" fill="#EF5350" stroke="#C62828" stroke-width="2"/>
        <line x1="30" y1="19" x2="30" y2="52" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="54" y2="36" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="10" y2="24" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="16" y2="78" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="42" y2="78" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
      </svg>

      <svg class="boneco-svg puxando-dir" id="boneco2c" width="38" height="58"
           viewBox="0 0 60 90" style="position:absolute;bottom:22%;right:29%;animation-delay:0.4s;">
        <circle cx="30" cy="10" r="9" fill="#EF5350" stroke="#C62828" stroke-width="2"/>
        <line x1="30" y1="19" x2="30" y2="52" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="54" y2="36" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="28" x2="10" y2="24" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="16" y2="78" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
        <line x1="30" y1="52" x2="42" y2="78" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
      </svg>

    </div><!-- /cena-cabo -->

    <!-- Placar central + barra -->
    <div id="placar-centro">
      <span class="pc-num az" id="pc1">0</span>
      <span class="pc-sep">×</span>
      <span class="pc-num vm" id="pc2">0</span>
    </div>
    <div id="barra-tensao">
      <div id="tensao-fill" style="width:50%;margin-left:0;"></div>
    </div>

  </div><!-- /centro -->

  <!-- CALCULADORA EQUIPE 2 -->
  <div class="painel vermelho" id="painel2">
    <div class="nome-equipe">🔴 EQUIPE 2</div>
    <div class="estrelas" id="estrelas2b"></div>
    <div class="calc-display" id="display2">
      <span class="calc-status" id="status2"></span>
      <span class="calc-valor"  id="valor2">_</span>
    </div>
    <div class="calc-grid" id="grid2"></div>
  </div>

</div><!-- /arena -->

<!-- FLASH -->
<div class="feedback-flash" id="flash"></div>

<!-- MSG RODADA -->
<div id="msg-rodada">
  <span class="emoji" id="msg-emoji">🎉</span>
  <div class="titulo" id="msg-titulo">Equipe 1 acertou!</div>
  <div class="sub"    id="msg-sub">Próxima pergunta em 2s...</div>
</div>

<!-- FIM DE JOGO -->
<div id="fim-jogo">
  <div class="confetes" id="confetes">🎊 🎉 🏆 🎉 🎊</div>
  <div class="trofeu"        id="trofeu">🏆</div>
  <div class="vencedor-nome" id="vencedor-nome">Equipe 1 Venceu!</div>
  <div class="placar-final"  id="placar-final">5 × 3</div>
  <button id="btn-reiniciar" onclick="reiniciar()">🔄 Jogar Novamente</button>
</div>

<script>
// ===== ESTADO =====
const TOTAL_RODADAS = 10;
const TEMPO_RODADA  = 30;
const TEMPO_PAUSA   = 2200;

let pontos1 = 0, pontos2 = 0;
let rodada  = 1;
let respostaCorreta = 0;
let timerInterval   = null;
let tempoRestante   = TEMPO_RODADA;
let rodadaAtiva     = true;
let entrada1 = '', entrada2 = '';
let audioCtx = null;

// ===== AUDIO =====
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function somAcerto() {
  try {
    const ctx = getAudio();
    [523.25,659.25,783.99,1046.5].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(f, ctx.currentTime+i*.1);
      g.gain.setValueAtTime(.3, ctx.currentTime+i*.1);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+i*.1+.25);
      o.start(ctx.currentTime+i*.1); o.stop(ctx.currentTime+i*.1+.25);
    });
  } catch(e){}
}
function somErro() {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+.3);
    g.gain.setValueAtTime(.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+.3);
  } catch(e){}
}
function somTic() {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'square'; o.frequency.setValueAtTime(800,ctx.currentTime);
    g.gain.setValueAtTime(.05,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.05);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+.05);
  } catch(e){}
}
function somVitoria() {
  try {
    const ctx = getAudio();
    [523,587,659,698,784,880,988,1047].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(f,ctx.currentTime+i*.08);
      g.gain.setValueAtTime(.3,ctx.currentTime+i*.08);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.08+.4);
      o.start(ctx.currentTime+i*.08); o.stop(ctx.currentTime+i*.08+.4);
    });
  } catch(e){}
}

// ===== PERGUNTAS =====
function gerarPergunta() {
  const tipo = Math.floor(Math.random()*3);
  let a,b,res,texto;
  if (tipo===0) {
    a = Math.floor(Math.random()*50)+5; b = Math.floor(Math.random()*50)+5;
    res = a+b; texto = `${a} + ${b} = ?`;
  } else if (tipo===1) {
    a = Math.floor(Math.random()*40)+20; b = Math.floor(Math.random()*(a-1))+1;
    res = a-b; texto = `${a} − ${b} = ?`;
  } else {
    const fats = [[2,3],[2,4],[2,5],[2,6],[3,3],[3,4],[3,5],[4,4],[4,5],[5,5],[2,7],[2,8],[3,6],[2,9],[6,6],[5,6],[4,6],[3,7],[3,8],[4,7]];
    const [fa,fb] = fats[Math.floor(Math.random()*fats.length)];
    res = fa*fb; texto = `${fa} × ${fb} = ?`;
  }
  return {texto,res};
}

// ===== CALCULADORA =====
function criarCalc(gridId, equipe) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  ['7','8','9','4','5','6','1','2','3','⌫','0','✓'].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'btn-num' + (n==='⌫'?' btn-del':'') + (n==='✓'?' btn-ok':'');
    if (n==='✓') btn.style.gridColumn = '1 / -1';
    btn.textContent = n==='✓' ? '✅ CONFIRMAR' : n;
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      btn.classList.add('pressed');
      setTimeout(()=>btn.classList.remove('pressed'),120);
      handleInput(equipe, n);
    });
    grid.appendChild(btn);
  });
}

function handleInput(eq, val) {
  if (!rodadaAtiva) return;
  somTic();
  if (eq===1) {
    if (val==='⌫') entrada1=entrada1.slice(0,-1);
    else if (val==='✓') confirmar(1);
    else if (entrada1.length<5) entrada1+=val;
    document.getElementById('valor1').textContent = entrada1||'_';
  } else {
    if (val==='⌫') entrada2=entrada2.slice(0,-1);
    else if (val==='✓') confirmar(2);
    else if (entrada2.length<5) entrada2+=val;
    document.getElementById('valor2').textContent = entrada2||'_';
  }
}

function confirmar(equipe) {
  if (!rodadaAtiva) return;
  const entrada = equipe===1 ? entrada1 : entrada2;
  if (!entrada) return;
  const resposta = parseInt(entrada);
  const display  = document.getElementById(`display${equipe}`);
  const status   = document.getElementById(`status${equipe}`);

  if (resposta===respostaCorreta) {
    rodadaAtiva = false;
    clearInterval(timerInterval);
    somAcerto();

    if (equipe===1) pontos1++; else pontos2++;

    display.classList.add('correto');
    status.textContent = '✅';
    mostrarBadge(equipe);

    const flash = document.getElementById('flash');
    flash.className = `feedback-flash acerto-${equipe===1?'azul':'vermelho'} visible`;
    setTimeout(()=>flash.className='feedback-flash',700);

    document.getElementById(`painel${equipe}`).classList.add(equipe===1?'brilho-azul':'brilho-vermelho');

    // Bonecos "celebram" esticando a corda
    animarPuxada(equipe);

    atualizarPlacar();
    atualizarCorda();

    mostrarMensagem('🎉', `${equipe===1?'Equipe 1 🔵':'Equipe 2 🔴'} acertou!`, 'Próxima pergunta em 2s...');
    setTimeout(()=>proximaRodada(), TEMPO_PAUSA);

  } else {
    somErro();
    display.classList.add('errado');
    status.textContent = '❌';
    setTimeout(()=>{ display.classList.remove('errado'); status.textContent=''; }, 600);
    if (equipe===1) entrada1=''; else entrada2='';
    document.getElementById(`valor${equipe}`).textContent = '_';
  }
}

// ===== ANIMAÇÃO PUXADA =====
function animarPuxada(equipe) {
  const ids = equipe===1
    ? ['boneco1a','boneco1b','boneco1c']
    : ['boneco2a','boneco2b','boneco2c'];
  ids.forEach((id,i) => {
    const el = document.getElementById(id);
    if (!el) return;
    setTimeout(()=>{
      const orig = el.style.animation;
      el.style.transform = `${equipe===2?'scaleX(-1) ':''} translateX(${equipe===1?'6px':'-6px'}) rotate(-10deg) scale(1.1)`;
      setTimeout(()=>{ el.style.transform = ''; }, 300);
    }, i*80);
  });
}

// ===== BADGE =====
function mostrarBadge(equipe) {
  const badge = document.createElement('div');
  badge.className = 'badge-acertou';
  badge.textContent = equipe===1 ? '🔵 +1 PONTO!' : '🔴 +1 PONTO!';
  badge.style.top  = '45%';
  badge.style.left = equipe===1 ? '8%' : '60%';
  badge.style.color = equipe===1 ? '#1565C0' : '#C62828';
  document.body.appendChild(badge);
  setTimeout(()=>badge.remove(), 1300);
}

// ===== PLACAR / CORDA =====
function atualizarPlacar() {
  document.getElementById('pts1').textContent = pontos1;
  document.getElementById('pts2').textContent = pontos2;
  document.getElementById('pc1').textContent  = pontos1;
  document.getElementById('pc2').textContent  = pontos2;
  atualizarEstrelas('estrelas1',  pontos1);
  atualizarEstrelas('estrelas1b', pontos1);
  atualizarEstrelas('estrelas2',  pontos2);
  atualizarEstrelas('estrelas2b', pontos2);
  ['pts1','pts2','pc1','pc2'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove('ponto-animado'); void el.offsetWidth; el.classList.add('ponto-animado');
  });
}

function atualizarEstrelas(id, pontos) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';
  for (let i=0;i<Math.min(pontos,TOTAL_RODADAS);i++){
    const s=document.createElement('span'); s.className='estrela ativa'; s.textContent='⭐'; el.appendChild(s);
  }
}

function atualizarCorda() {
  const diff = pontos1 - pontos2; // positivo = azul dominando
  const MAX = 5;
  const offset = Math.max(-MAX, Math.min(MAX, diff));

  // Move bandeira central (50% de largura do centro)
  const centroPct = 50 + (offset / MAX) * -18; // vai de 32% a 68%
  document.getElementById('bandeira').style.left = `${centroPct}%`;

  // Distorce a corda
  const noX = 200 + offset * -15;
  document.getElementById('no-corda').setAttribute('cx', noX);
  const sag = 145 + Math.abs(offset) * 2;
  document.getElementById('corda-path').setAttribute('d',
    `M 30,150 C 80,${sag-10} 120,${sag+8} ${noX},${sag} C ${400-noX+noX},${sag+8} 320,${sag-10} 370,150`
  );
  document.getElementById('corda-sombra').setAttribute('d',
    `M 30,156 C 80,${sag-4} 120,${sag+14} ${noX},${sag+6} C ${400-noX+noX},${sag+14} 320,${sag-4} 370,156`
  );

  // Barra de tensão (0% = Equipe 2 domina, 50% = empate, 100% = Equipe 1 domina)
  const pct = ((offset + MAX) / (2 * MAX)) * 100;
  const fill = document.getElementById('tensao-fill');
  const largura = Math.abs(pct - 50) * 2;
  if (pct >= 50) {
    fill.style.marginLeft = '50%';
    fill.style.width = `${largura/2}%`;
    fill.style.background = 'linear-gradient(90deg,#FFD600,#42A5F5)';
  } else {
    fill.style.marginLeft = `${50 - largura/2}%`;
    fill.style.width = `${largura/2}%`;
    fill.style.background = 'linear-gradient(90deg,#EF5350,#FFD600)';
  }
}

// ===== TIMER =====
function iniciarTimer() {
  tempoRestante = TEMPO_RODADA;
  const progress = document.getElementById('progress-fill');
  const timer    = document.getElementById('timer');
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    tempoRestante--;
    timer.textContent = tempoRestante;
    progress.style.width = `${(tempoRestante/TEMPO_RODADA)*100}%`;
    if (tempoRestante<=5) { timer.classList.add('urgente'); if(tempoRestante>0) somTic(); }
    else timer.classList.remove('urgente');
    if (tempoRestante<=0) {
      clearInterval(timerInterval);
      if (rodadaAtiva) {
        rodadaAtiva=false;
        mostrarMensagem('⏰','Tempo esgotado!','Ninguém pontuou. Próxima...');
        setTimeout(()=>proximaRodada(), TEMPO_PAUSA);
      }
    }
  },1000);
}

// ===== RODADAS =====
function proximaRodada() {
  esconderMensagem();
  document.getElementById('painel1').className='painel azul';
  document.getElementById('painel2').className='painel vermelho';
  ['display1','display2'].forEach(id=>document.getElementById(id).className='calc-display');
  document.getElementById('status1').textContent='';
  document.getElementById('status2').textContent='';
  entrada1=''; entrada2='';
  document.getElementById('valor1').textContent='_';
  document.getElementById('valor2').textContent='_';

  if (rodada>=TOTAL_RODADAS) { fimDeJogo(); return; }
  rodada++;
  document.getElementById('rodada-num').textContent = rodada;
  novaPergunta();
  rodadaAtiva=true;
  iniciarTimer();
}

function novaPergunta() {
  const {texto,res} = gerarPergunta();
  respostaCorreta = res;
  const el = document.getElementById('pergunta-texto');
  el.style.transition='none'; el.style.transform='scale(0.8)'; el.style.opacity='0';
  el.textContent = texto;
  requestAnimationFrame(()=>{
    el.style.transition='all 0.3s cubic-bezier(.34,1.56,.64,1)';
    el.style.transform='scale(1)'; el.style.opacity='1';
  });
}

function mostrarMensagem(emoji,titulo,sub) {
  document.getElementById('msg-emoji').textContent=emoji;
  document.getElementById('msg-titulo').textContent=titulo;
  document.getElementById('msg-sub').textContent=sub;
  document.getElementById('msg-rodada').classList.add('visivel');
}
function esconderMensagem() { document.getElementById('msg-rodada').classList.remove('visivel'); }

// ===== FIM DE JOGO =====
function fimDeJogo() {
  clearInterval(timerInterval);
  somVitoria();
  const fim=document.getElementById('fim-jogo');
  let classe,trofeu,nome;
  if (pontos1>pontos2)      { classe='azul-venceu';    trofeu='🏆'; nome='🔵 EQUIPE 1 VENCEU!'; }
  else if (pontos2>pontos1) { classe='vermelho-venceu'; trofeu='🏆'; nome='🔴 EQUIPE 2 VENCEU!'; }
  else                      { classe='empate';          trofeu='🤝'; nome='EMPATE! 🎊'; }
  fim.className=classe; fim.style.display='flex';
  document.getElementById('trofeu').textContent=trofeu;
  document.getElementById('vencedor-nome').textContent=nome;
  document.getElementById('placar-final').textContent=`Placar Final: ${pontos1} × ${pontos2}`;
}

// ===== REINICIAR =====
function reiniciar() {
  pontos1=0; pontos2=0; rodada=1; entrada1=''; entrada2='';
  document.getElementById('fim-jogo').style.display='none';
  document.getElementById('rodada-num').textContent='1';
  document.getElementById('painel1').className='painel azul';
  document.getElementById('painel2').className='painel vermelho';
  document.getElementById('timer').classList.remove('urgente');
  document.getElementById('bandeira').style.left='50%';
  document.getElementById('no-corda').setAttribute('cx','200');
  document.getElementById('corda-path').setAttribute('d','M 30,150 C 80,140 120,160 200,150 C 280,140 320,160 370,150');
  document.getElementById('corda-sombra').setAttribute('d','M 30,156 C 80,146 120,166 200,156 C 280,146 320,166 370,156');
  const tf=document.getElementById('tensao-fill'); tf.style.width='0%'; tf.style.marginLeft='50%';
  ['estrelas1','estrelas1b','estrelas2','estrelas2b'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.innerHTML='';
  });
  ['display1','display2'].forEach(id=>document.getElementById(id).className='calc-display');
  ['status1','status2'].forEach(id=>document.getElementById(id).textContent='');
  atualizarPlacar();
  novaPergunta();
  rodadaAtiva=true;
  iniciarTimer();
}

// ===== INIT =====
function init() {
  criarCalc('grid1',1);
  criarCalc('grid2',2);
  novaPergunta();
  atualizarPlacar();
  iniciarTimer();
}

document.addEventListener('pointerdown',()=>{ try{getAudio().resume();}catch(e){} },{once:false});
init();
</script>
</body>
