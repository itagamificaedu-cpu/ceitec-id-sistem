<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪢 Cabo de Guerra — Batalha de Calculadoras</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #1a1a2e;
  height: 100vh; width: 100vw;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* HEADER */
#header {
  background: linear-gradient(135deg,#0d0d0d,#1a1a2e);
  padding: 6px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid #FFD600;
  flex-shrink: 0; gap: 8px;
}
.placar-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.08); border-radius:12px;
  padding:6px 14px; border:2px solid rgba(255,255,255,0.15);
}
.placar-eq { font-size:clamp(1.1rem,2.5vw,1.8rem); font-weight:900; letter-spacing:1px; }
.placar-eq.azul     { color:#42A5F5; text-shadow:0 0 12px #42A5F5; }
.placar-eq.vermelho { color:#EF5350; text-shadow:0 0 12px #EF5350; }
#timer-box {
  background:rgba(255,214,0,0.15); border:2px solid #FFD600;
  border-radius:12px; padding:6px 18px; text-align:center;
}
#timer-label { color:#aaa; font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; }
#timer { font-size:clamp(1.6rem,3.5vw,2.4rem); font-weight:900; color:#FFD600; line-height:1; }
#timer.urgente { color:#EF5350; animation:pulsa 0.5s infinite; }
#rodada-box { color:#aaa; font-size:0.8rem; text-align:center; }
#rodada-box span { display:block; color:white; font-size:1rem; font-weight:700; }
@keyframes pulsa { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

/* PROGRESS */
#progress-bar { height:5px; background:rgba(255,255,255,0.1); flex-shrink:0; }
#progress-fill { height:100%; background:linear-gradient(90deg,#FFD600,#FF8F00); transition:width 1s linear; }

/* PERGUNTA */
#pergunta-area {
  background:linear-gradient(135deg,#FFD600,#FF8F00);
  padding:8px 20px; text-align:center; flex-shrink:0;
  border-bottom:3px solid rgba(0,0,0,0.3);
}
#pergunta-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; color:rgba(0,0,0,0.5); font-weight:600; }
#pergunta-texto { font-size:clamp(1.8rem,4.5vw,3rem); font-weight:900; color:#1a1a2e; letter-spacing:2px; line-height:1.1; }

/* ARENA — 3 colunas */
#arena {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  min-height: 0;
}

/* PAINÉIS LATERAIS */
.painel {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:10px; gap:8px;
}
.painel.azul     { background:linear-gradient(160deg,#0d47a1,#1565C0); }
.painel.vermelho { background:linear-gradient(160deg,#b71c1c,#C62828); }
.painel.brilho-azul     { background:linear-gradient(160deg,#1565C0,#42A5F5); }
.painel.brilho-vermelho { background:linear-gradient(160deg,#C62828,#EF5350); }

.nome-equipe {
  font-size:clamp(0.85rem,1.8vw,1.3rem); font-weight:900; color:white;
  text-shadow:0 2px 8px rgba(0,0,0,0.5); letter-spacing:1px; text-align:center;
}

/* CALCULADORA */
.calc-display {
  width:100%; max-width:220px;
  background:rgba(0,0,0,0.5); border-radius:10px;
  padding:8px 12px; text-align:right;
  border:2px solid rgba(255,255,255,0.2);
  min-height:46px; display:flex; align-items:center; justify-content:flex-end; gap:6px;
}
.calc-valor  { font-size:clamp(1.3rem,2.3vw,1.9rem); font-weight:900; color:white; }
.calc-status { font-size:1.2rem; min-width:26px; text-align:center; }

.calc-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:5px; width:100%; max-width:220px;
}
.btn-num {
  background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.25);
  border-radius:10px; color:white;
  font-size:clamp(1rem,2vw,1.4rem); font-weight:800;
  cursor:pointer; aspect-ratio:1.2;
  transition:all 0.12s; touch-action:manipulation;
  display:flex; align-items:center; justify-content:center;
}
.btn-num:active, .btn-num.pressed { background:rgba(255,255,255,0.4); transform:scale(0.93); }
.btn-del { background:rgba(255,100,100,0.3); border-color:rgba(255,100,100,0.5); font-size:clamp(0.75rem,1.3vw,1rem); }
.btn-ok {
  grid-column:1/-1;
  background:#FFD600; border:2px solid #FF8F00; border-radius:10px;
  color:#1a1a2e; font-size:clamp(0.9rem,1.8vw,1.2rem); font-weight:900;
  cursor:pointer; padding:9px; transition:all 0.12s;
  touch-action:manipulation; letter-spacing:1px;
}
.btn-ok:active, .btn-ok.pressed { background:#FF8F00; transform:scale(0.97); }
.calc-display.correto { border-color:#69F0AE !important; box-shadow:0 0 12px #69F0AE; }
.calc-display.errado  { border-color:#EF5350 !important; box-shadow:0 0 12px #EF5350; animation:shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

/* ========================
   CENTRO — BONECOS + CORDA
   ======================== */
#centro {
  background:linear-gradient(180deg,#0a0a1a,#111130,#0a0a1a);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-left:3px solid rgba(255,255,255,0.08);
  border-right:3px solid rgba(255,255,255,0.08);
  padding:8px 0; gap:6px; overflow:hidden;
}

/* BANDEIRA */
#bandeira {
  font-size:clamp(1.2rem,2.5vw,1.8rem);
  transition:transform 0.5s ease;
  flex-shrink:0;
}

/* CENA: bonecos + corda em linha */
#cena-cabo {
  display:flex;
  flex-direction:row;
  align-items:flex-end;
  justify-content:center;
  gap:0;
  width:100%;
  flex:1;
  min-height:0;
  padding:0 4px;
}

/* GRUPO de bonecos */
.grupo-bonecos {
  display:flex;
  flex-direction:row;
  align-items:flex-end;
  gap:2px;
  flex-shrink:0;
}
.grupo-bonecos.esq { flex-direction:row-reverse; }

/* BONECO SVG inline */
.boneco {
  display:flex;
  align-items:flex-end;
}
.boneco svg {
  width: clamp(28px, 4.5vw, 56px);
  height: auto;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));
}

/* Animação puxar esquerda */
@keyframes puxar-esq {
  0%,100% { transform: rotate(-8deg) translateX(-2px); }
  50%      { transform: rotate(-2deg) translateX(4px); }
}
@keyframes puxar-dir {
  0%,100% { transform: scaleX(-1) rotate(-8deg) translateX(-2px); }
  50%      { transform: scaleX(-1) rotate(-2deg) translateX(4px); }
}
.boneco.esq svg { animation: puxar-esq 0.85s ease-in-out infinite; }
.boneco.dir svg { animation: puxar-dir 0.85s ease-in-out infinite; }
.boneco.esq:nth-child(2) svg { animation-delay: 0.2s; }
.boneco.esq:nth-child(3) svg { animation-delay: 0.4s; }
.boneco.dir:nth-child(2) svg { animation-delay: 0.2s; }
.boneco.dir:nth-child(3) svg { animation-delay: 0.4s; }

/* CORDA SVG */
#corda-wrap {
  flex:1;
  min-width:0;
  display:flex;
  align-items:center;
  padding:0 2px;
  padding-bottom:8px;
}
#corda-svg {
  width:100%; height:60px;
  overflow:visible;
}

/* PLACAR CENTRAL */
#placar-centro {
  background:rgba(0,0,0,0.55); border:2px solid rgba(255,214,0,0.4);
  border-radius:20px; padding:4px 18px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.pc-num { font-size:clamp(1.4rem,3vw,2.2rem); font-weight:900; }
.pc-num.az { color:#42A5F5; text-shadow:0 0 10px #42A5F5; }
.pc-num.vm { color:#EF5350; text-shadow:0 0 10px #EF5350; }
.pc-sep { color:#aaa; font-size:1.2rem; font-weight:300; }

/* BARRA DE TENSÃO */
#barra-tensao {
  width:80%; max-width:180px; height:8px;
  background:rgba(255,255,255,0.1); border-radius:10px;
  overflow:hidden; flex-shrink:0;
}
#tensao-fill {
  height:100%; border-radius:10px;
  background:linear-gradient(90deg,#42A5F5,#FFD600,#EF5350);
  transition:all 0.5s ease;
}

/* FLASH */
.feedback-flash { position:fixed; inset:0; pointer-events:none; z-index:50; opacity:0; transition:opacity 0.15s; }
.feedback-flash.acerto-azul    { background:radial-gradient(ellipse at 15% 50%,rgba(66,165,245,0.4),transparent 65%); }
.feedback-flash.acerto-vermelho{ background:radial-gradient(ellipse at 85% 50%,rgba(239,83,80,0.4),transparent 65%); }
.feedback-flash.visible { opacity:1; }

/* MSG RODADA */
#msg-rodada {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:rgba(0,0,0,0.92); border:3px solid #FFD600;
  border-radius:20px; padding:20px 36px; text-align:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1); max-width:90vw;
}
#msg-rodada.visivel { opacity:1; transform:translate(-50%,-50%) scale(1); }
#msg-rodada .emoji  { font-size:3rem; display:block; margin-bottom:6px; }
#msg-rodada .titulo { font-size:clamp(1.2rem,3vw,1.8rem); font-weight:900; color:#FFD600; }
#msg-rodada .sub    { font-size:clamp(0.9rem,2vw,1.1rem); color:#aaa; margin-top:4px; }

/* FIM */
#fim-jogo {
  display:none; position:fixed; inset:0; z-index:200;
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:30px;
}
#fim-jogo.azul-venceu     { background:linear-gradient(135deg,#0d47a1,#1565C0,#42A5F5); }
#fim-jogo.vermelho-venceu { background:linear-gradient(135deg,#b71c1c,#C62828,#EF5350); }
#fim-jogo.empate          { background:linear-gradient(135deg,#1a1a2e,#2d2d5e); }
#fim-jogo .trofeu         { font-size:clamp(4rem,12vw,8rem); animation:pula 0.5s ease-in-out infinite alternate; }
#fim-jogo .vencedor-nome  { font-size:clamp(2rem,6vw,4rem); font-weight:900; color:white; margin:10px 0; }
#fim-jogo .placar-final   { font-size:clamp(1.2rem,3vw,2rem); color:rgba(255,255,255,.85); margin:8px 0; }
@keyframes pula { from{transform:translateY(0) rotate(-5deg);} to{transform:translateY(-20px) rotate(5deg);} }
#btn-reiniciar {
  margin-top:20px; background:#FFD600; border:none; border-radius:14px;
  padding:14px 40px; font-size:clamp(1rem,2.5vw,1.4rem); font-weight:900;
  color:#1a1a2e; cursor:pointer; letter-spacing:1px; touch-action:manipulation;
}
#btn-reiniciar:active { transform:scale(0.95); }

/* badge */
.badge-acertou {
  position:fixed; font-size:clamp(1rem,2.5vw,1.5rem); font-weight:900;
  background:#69F0AE; color:#1a1a2e; border-radius:12px; padding:8px 18px;
  z-index:60; pointer-events:none;
  animation:badge-fly 1.2s ease-out forwards; white-space:nowrap;
}
@keyframes badge-fly { 0%{opacity:1;transform:translateY(0) scale(1);} 60%{opacity:1;transform:translateY(-50px) scale(1.1);} 100%{opacity:0;transform:translateY(-100px) scale(.9);} }
@keyframes ponto-ganho { 0%{transform:scale(1);} 30%{transform:scale(1.3);} 100%{transform:scale(1);} }
.ponto-animado { animation:ponto-ganho .5s ease-out; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="placar-box">
    <div>
      <div style="color:#aaa;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;">Equipe 1</div>
      <div class="placar-eq azul" id="pts1">0</div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
    <div id="timer-box">
      <div id="timer-label">Tempo</div>
      <div id="timer">30</div>
    </div>
    <div id="rodada-box">Rodada <span id="rodada-num">1</span>/10</div>
  </div>

  <div class="placar-box">
    <div style="text-align:right;">
      <div style="color:#aaa;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;text-align:right;">Equipe 2</div>
      <div class="placar-eq vermelho" id="pts2">0</div>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div id="progress-bar"><div id="progress-fill" style="width:100%"></div></div>

<!-- PERGUNTA -->
<div id="pergunta-area">
  <div id="pergunta-label">⚡ Responda primeiro e puxe a corda! ⚡</div>
  <div id="pergunta-texto">Carregando...</div>
</div>

<!-- ARENA 3 colunas -->
<div id="arena">

  <!-- COL 1: Calculadora Equipe 1 -->
  <div class="painel azul" id="painel1">
    <div class="nome-equipe">🔵 EQUIPE 1</div>
    <div class="calc-display" id="display1">
      <span class="calc-status" id="status1"></span>
      <span class="calc-valor"  id="valor1">_</span>
    </div>
    <div class="calc-grid" id="grid1"></div>
  </div>

  <!-- COL 2: CENTRO — bonecos + corda -->
  <div id="centro">

    <div id="bandeira">🚩</div>

    <!-- CENA PRINCIPAL: bonecos e corda em linha -->
    <div id="cena-cabo">

      <!-- BONECOS EQUIPE 1 (azuis, à esquerda, puxando para esquerda) -->
      <div class="grupo-bonecos esq">

        <div class="boneco esq">
          <svg viewBox="0 0 50 90" xmlns="http://www.w3.org/2000/svg">
            <!-- cabeça -->
            <circle cx="25" cy="10" r="9" fill="#42A5F5" stroke="#1a5fa8" stroke-width="2"/>
            <!-- corpo -->
            <line x1="25" y1="19" x2="25" y2="55" stroke="#42A5F5" stroke-width="5" stroke-linecap="round"/>
            <!-- braço direito — esticado para frente (segurando corda) -->
            <line x1="25" y1="30" x2="47" y2="38" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <!-- braço esquerdo — para trás (esforço) -->
            <line x1="25" y1="30" x2="5"  y2="25" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <!-- perna direita -->
            <line x1="25" y1="55" x2="38" y2="82" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <!-- perna esquerda -->
            <line x1="25" y1="55" x2="12" y2="82" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <!-- mão segurando -->
            <circle cx="47" cy="38" r="3" fill="#FFD600"/>
          </svg>
        </div>

        <div class="boneco esq">
          <svg viewBox="0 0 50 90" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="10" r="9" fill="#42A5F5" stroke="#1a5fa8" stroke-width="2"/>
            <line x1="25" y1="19" x2="25" y2="55" stroke="#42A5F5" stroke-width="5" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="47" y2="38" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="5"  y2="25" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="38" y2="82" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="12" y2="82" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <circle cx="47" cy="38" r="3" fill="#FFD600"/>
          </svg>
        </div>

        <div class="boneco esq">
          <svg viewBox="0 0 50 90" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="10" r="9" fill="#42A5F5" stroke="#1a5fa8" stroke-width="2"/>
            <line x1="25" y1="19" x2="25" y2="55" stroke="#42A5F5" stroke-width="5" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="47" y2="38" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="5"  y2="25" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="38" y2="82" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="12" y2="82" stroke="#42A5F5" stroke-width="4" stroke-linecap="round"/>
            <circle cx="47" cy="38" r="3" fill="#FFD600"/>
          </svg>
        </div>

      </div><!-- /grupo esq -->

      <!-- CORDA -->
      <div id="corda-wrap">
        <svg id="corda-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
          <defs>
            <linearGradient id="gCorda" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#42A5F5"/>
              <stop offset="50%"  stop-color="#D4A017"/>
              <stop offset="100%" stop-color="#EF5350"/>
            </linearGradient>
          </defs>
          <!-- sombra -->
          <path id="corda-sombra" d="M 0,35 Q 100,38 200,35" stroke="rgba(0,0,0,0.4)" stroke-width="7" fill="none" stroke-linecap="round"/>
          <!-- corda -->
          <path id="corda-path"   d="M 0,30 Q 100,33 200,30" stroke="url(#gCorda)"       stroke-width="7" fill="none" stroke-linecap="round"/>
          <!-- nó central -->
          <circle id="no-corda" cx="100" cy="31" r="6" fill="#FFD600" stroke="#CC8800" stroke-width="2"/>
        </svg>
      </div>

      <!-- BONECOS EQUIPE 2 (vermelhos, à direita, espelhados puxando para direita) -->
      <div class="grupo-bonecos dir">

        <div class="boneco dir">
          <svg viewBox="0 0 50 90" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="10" r="9" fill="#EF5350" stroke="#8B0000" stroke-width="2"/>
            <line x1="25" y1="19" x2="25" y2="55" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="47" y2="38" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="5"  y2="25" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="38" y2="82" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="12" y2="82" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <circle cx="47" cy="38" r="3" fill="#FFD600"/>
          </svg>
        </div>

        <div class="boneco dir">
          <svg viewBox="0 0 50 90" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="10" r="9" fill="#EF5350" stroke="#8B0000" stroke-width="2"/>
            <line x1="25" y1="19" x2="25" y2="55" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="47" y2="38" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="5"  y2="25" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="38" y2="82" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="12" y2="82" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <circle cx="47" cy="38" r="3" fill="#FFD600"/>
          </svg>
        </div>

        <div class="boneco dir">
          <svg viewBox="0 0 50 90" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="10" r="9" fill="#EF5350" stroke="#8B0000" stroke-width="2"/>
            <line x1="25" y1="19" x2="25" y2="55" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="47" y2="38" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="30" x2="5"  y2="25" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="38" y2="82" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <line x1="25" y1="55" x2="12" y2="82" stroke="#EF5350" stroke-width="4" stroke-linecap="round"/>
            <circle cx="47" cy="38" r="3" fill="#FFD600"/>
          </svg>
        </div>

      </div><!-- /grupo dir -->

    </div><!-- /cena-cabo -->

    <!-- Placar e barra -->
    <div id="placar-centro">
      <span class="pc-num az" id="pc1">0</span>
      <span class="pc-sep">×</span>
      <span class="pc-num vm" id="pc2">0</span>
    </div>
    <div id="barra-tensao">
      <div id="tensao-fill" style="width:0%;margin-left:50%;"></div>
    </div>

  </div><!-- /centro -->

  <!-- COL 3: Calculadora Equipe 2 -->
  <div class="painel vermelho" id="painel2">
    <div class="nome-equipe">🔴 EQUIPE 2</div>
    <div class="calc-display" id="display2">
      <span class="calc-status" id="status2"></span>
      <span class="calc-valor"  id="valor2">_</span>
    </div>
    <div class="calc-grid" id="grid2"></div>
  </div>

</div><!-- /arena -->

<!-- FLASH -->
<div class="feedback-flash" id="flash"></div>

<!-- MSG RODADA -->
<div id="msg-rodada">
  <span class="emoji" id="msg-emoji">🎉</span>
  <div class="titulo" id="msg-titulo">Equipe 1 acertou!</div>
  <div class="sub"    id="msg-sub">Próxima pergunta em 2s...</div>
</div>

<!-- FIM DE JOGO -->
<div id="fim-jogo">
  <div class="trofeu"        id="trofeu">🏆</div>
  <div class="vencedor-nome" id="vencedor-nome">Equipe 1 Venceu!</div>
  <div class="placar-final"  id="placar-final">5 × 3</div>
  <button id="btn-reiniciar" onclick="reiniciar()">🔄 Jogar Novamente</button>
</div>

<script>
const TOTAL_RODADAS = 10;
const TEMPO_RODADA  = 30;
const TEMPO_PAUSA   = 2200;

let pontos1=0, pontos2=0, rodada=1;
let respostaCorreta=0, timerInterval=null, tempoRestante=TEMPO_RODADA;
let rodadaAtiva=true, entrada1='', entrada2='';
let audioCtx=null;

function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function somAcerto(){
  try{ const c=getAudio();
    [523,659,784,1047].forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.setValueAtTime(f,c.currentTime+i*.1);
      g.gain.setValueAtTime(.3,c.currentTime+i*.1);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.1+.25);
      o.start(c.currentTime+i*.1);o.stop(c.currentTime+i*.1+.25); }); }catch(e){}
}
function somErro(){
  try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(80,c.currentTime+.3);
    g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);
    o.start(c.currentTime);o.stop(c.currentTime+.3); }catch(e){}
}
function somTic(){
  try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);
    o.type='square';o.frequency.setValueAtTime(800,c.currentTime);
    g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.05);
    o.start(c.currentTime);o.stop(c.currentTime+.05); }catch(e){}
}
function somVitoria(){
  try{ const c=getAudio();
    [523,587,659,698,784,880,988,1047].forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.setValueAtTime(f,c.currentTime+i*.08);
      g.gain.setValueAtTime(.3,c.currentTime+i*.08);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.08+.4);
      o.start(c.currentTime+i*.08);o.stop(c.currentTime+i*.08+.4); }); }catch(e){}
}

function gerarPergunta(){
  const t=Math.floor(Math.random()*3); let a,b,res,texto;
  if(t===0){ a=Math.floor(Math.random()*50)+5;b=Math.floor(Math.random()*50)+5;res=a+b;texto=`${a} + ${b} = ?`; }
  else if(t===1){ a=Math.floor(Math.random()*40)+20;b=Math.floor(Math.random()*(a-1))+1;res=a-b;texto=`${a} − ${b} = ?`; }
  else{ const f=[[2,3],[2,4],[2,5],[2,6],[3,3],[3,4],[3,5],[4,4],[4,5],[5,5],[2,7],[2,8],[3,6],[2,9],[6,6],[5,6],[4,6],[3,7],[3,8],[4,7]];
    const[fa,fb]=f[Math.floor(Math.random()*f.length)];res=fa*fb;texto=`${fa} × ${fb} = ?`; }
  return{texto,res};
}

function criarCalc(gridId,eq){
  const grid=document.getElementById(gridId); grid.innerHTML='';
  ['7','8','9','4','5','6','1','2','3','⌫','0','✓'].forEach(n=>{
    const btn=document.createElement('button');
    btn.className='btn-num'+(n==='⌫'?' btn-del':'')+(n==='✓'?' btn-ok':'');
    if(n==='✓') btn.style.gridColumn='1/-1';
    btn.textContent=n==='✓'?'↵ ENTER':n;
    btn.addEventListener('pointerdown',e=>{ e.preventDefault();
      btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),120);
      handleInput(eq,n); });
    grid.appendChild(btn);
  });
}

function handleInput(eq,val){
  if(!rodadaAtiva) return; somTic();
  if(eq===1){
    if(val==='⌫') entrada1=entrada1.slice(0,-1);
    else if(val==='✓') confirmar(1);
    else if(entrada1.length<5) entrada1+=val;
    document.getElementById('valor1').textContent=entrada1||'_';
  } else {
    if(val==='⌫') entrada2=entrada2.slice(0,-1);
    else if(val==='✓') confirmar(2);
    else if(entrada2.length<5) entrada2+=val;
    document.getElementById('valor2').textContent=entrada2||'_';
  }
}

function confirmar(eq){
  if(!rodadaAtiva) return;
  const entrada=eq===1?entrada1:entrada2;
  if(!entrada) return;
  const resposta=parseInt(entrada);
  const display=document.getElementById(`display${eq}`);
  const status=document.getElementById(`status${eq}`);
  if(resposta===respostaCorreta){
    rodadaAtiva=false; clearInterval(timerInterval); somAcerto();
    if(eq===1) pontos1++; else pontos2++;
    display.classList.add('correto'); status.textContent='✅';
    mostrarBadge(eq);
    const flash=document.getElementById('flash');
    flash.className=`feedback-flash acerto-${eq===1?'azul':'vermelho'} visible`;
    setTimeout(()=>flash.className='feedback-flash',700);
    document.getElementById(`painel${eq}`).classList.add(eq===1?'brilho-azul':'brilho-vermelho');
    atualizarPlacar(); atualizarCorda();
    mostrarMensagem('🎉',`${eq===1?'Equipe 1 🔵':'Equipe 2 🔴'} acertou!`,'Próxima pergunta em 2s...');
    setTimeout(()=>proximaRodada(),TEMPO_PAUSA);
  } else {
    somErro(); display.classList.add('errado'); status.textContent='❌';
    setTimeout(()=>{ display.classList.remove('errado'); status.textContent=''; },600);
    if(eq===1) entrada1=''; else entrada2='';
    document.getElementById(`valor${eq}`).textContent='_';
  }
}

function mostrarBadge(eq){
  const b=document.createElement('div'); b.className='badge-acertou';
  b.textContent=eq===1?'🔵 +1 PONTO!':'🔴 +1 PONTO!';
  b.style.top='42%'; b.style.left=eq===1?'5%':'55%';
  b.style.color=eq===1?'#1565C0':'#C62828';
  document.body.appendChild(b); setTimeout(()=>b.remove(),1300);
}

function atualizarPlacar(){
  ['pts1','pc1'].forEach(id=>{ const el=document.getElementById(id); el.textContent=pontos1; el.classList.remove('ponto-animado'); void el.offsetWidth; el.classList.add('ponto-animado'); });
  ['pts2','pc2'].forEach(id=>{ const el=document.getElementById(id); el.textContent=pontos2; el.classList.remove('ponto-animado'); void el.offsetWidth; el.classList.add('ponto-animado'); });
}

function atualizarCorda(){
  const diff=pontos1-pontos2; const MAX=5;
  const offset=Math.max(-MAX,Math.min(MAX,diff));
  // bandeira se move
  const pct=50+offset*-4;
  document.getElementById('bandeira').style.transform=`translateX(${offset*-12}px)`;
  // curva da corda
  const cy=33+Math.abs(offset)*1.5;
  const cx=100+offset*-8;
  document.getElementById('corda-path').setAttribute('d',`M 0,30 Q ${cx},${cy} 200,30`);
  document.getElementById('corda-sombra').setAttribute('d',`M 0,36 Q ${cx},${cy+5} 200,36`);
  document.getElementById('no-corda').setAttribute('cx',cx);
  document.getElementById('no-corda').setAttribute('cy',cy);
  // barra tensão
  const fill=document.getElementById('tensao-fill');
  const w=Math.abs(offset)/MAX*50;
  if(offset>=0){ fill.style.marginLeft='50%'; fill.style.width=`${w}%`; fill.style.background='linear-gradient(90deg,#FFD600,#42A5F5)'; }
  else { fill.style.marginLeft=`${50-w}%`; fill.style.width=`${w}%`; fill.style.background='linear-gradient(90deg,#EF5350,#FFD600)'; }
}

function iniciarTimer(){
  tempoRestante=TEMPO_RODADA;
  const prog=document.getElementById('progress-fill');
  const timer=document.getElementById('timer');
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    tempoRestante--;
    timer.textContent=tempoRestante;
    prog.style.width=`${(tempoRestante/TEMPO_RODADA)*100}%`;
    if(tempoRestante<=5){ timer.classList.add('urgente'); if(tempoRestante>0) somTic(); }
    else timer.classList.remove('urgente');
    if(tempoRestante<=0){
      clearInterval(timerInterval);
      if(rodadaAtiva){ rodadaAtiva=false;
        mostrarMensagem('⏰','Tempo esgotado!','Ninguém pontuou. Próxima...');
        setTimeout(()=>proximaRodada(),TEMPO_PAUSA); }
    }
  },1000);
}

function proximaRodada(){
  esconderMensagem();
  document.getElementById('painel1').className='painel azul';
  document.getElementById('painel2').className='painel vermelho';
  ['display1','display2'].forEach(id=>document.getElementById(id).className='calc-display');
  ['status1','status2'].forEach(id=>document.getElementById(id).textContent='');
  entrada1=''; entrada2='';
  document.getElementById('valor1').textContent='_';
  document.getElementById('valor2').textContent='_';
  if(rodada>=TOTAL_RODADAS){ fimDeJogo(); return; }
  rodada++; document.getElementById('rodada-num').textContent=rodada;
  novaPergunta(); rodadaAtiva=true; iniciarTimer();
}

function novaPergunta(){
  const{texto,res}=gerarPergunta(); respostaCorreta=res;
  const el=document.getElementById('pergunta-texto');
  el.style.transition='none'; el.style.transform='scale(0.8)'; el.style.opacity='0';
  el.textContent=texto;
  requestAnimationFrame(()=>{ el.style.transition='all 0.3s cubic-bezier(.34,1.56,.64,1)'; el.style.transform='scale(1)'; el.style.opacity='1'; });
}

function mostrarMensagem(emoji,titulo,sub){
  document.getElementById('msg-emoji').textContent=emoji;
  document.getElementById('msg-titulo').textContent=titulo;
  document.getElementById('msg-sub').textContent=sub;
  document.getElementById('msg-rodada').classList.add('visivel');
}
function esconderMensagem(){ document.getElementById('msg-rodada').classList.remove('visivel'); }

function fimDeJogo(){
  clearInterval(timerInterval); somVitoria();
  const fim=document.getElementById('fim-jogo');
  let cls,trofeu,nome;
  if(pontos1>pontos2)      { cls='azul-venceu';    trofeu='🏆'; nome='🔵 EQUIPE 1 VENCEU!'; }
  else if(pontos2>pontos1) { cls='vermelho-venceu'; trofeu='🏆'; nome='🔴 EQUIPE 2 VENCEU!'; }
  else                     { cls='empate';          trofeu='🤝'; nome='EMPATE! 🎊'; }
  fim.className=cls; fim.style.display='flex';
  document.getElementById('trofeu').textContent=trofeu;
  document.getElementById('vencedor-nome').textContent=nome;
  document.getElementById('placar-final').textContent=`Placar Final: ${pontos1} × ${pontos2}`;
}

function reiniciar(){
  pontos1=0; pontos2=0; rodada=1; entrada1=''; entrada2='';
  document.getElementById('fim-jogo').style.display='none';
  document.getElementById('rodada-num').textContent='1';
  document.getElementById('painel1').className='painel azul';
  document.getElementById('painel2').className='painel vermelho';
  document.getElementById('timer').classList.remove('urgente');
  document.getElementById('bandeira').style.transform='translateX(0)';
  document.getElementById('corda-path').setAttribute('d','M 0,30 Q 100,33 200,30');
  document.getElementById('corda-sombra').setAttribute('d','M 0,36 Q 100,39 200,36');
  document.getElementById('no-corda').setAttribute('cx','100');
  document.getElementById('no-corda').setAttribute('cy','31');
  const tf=document.getElementById('tensao-fill'); tf.style.width='0%'; tf.style.marginLeft='50%';
  ['display1','display2'].forEach(id=>document.getElementById(id).className='calc-display');
  ['status1','status2'].forEach(id=>document.getElementById(id).textContent='');
  atualizarPlacar(); novaPergunta(); rodadaAtiva=true; iniciarTimer();
}

function init(){
  criarCalc('grid1',1); criarCalc('grid2',2);
  novaPergunta(); atualizarPlacar(); iniciarTimer();
}

document.addEventListener('pointerdown',()=>{ try{getAudio().resume();}catch(e){} },{once:false});
init();
</script>
</body>
</html>
