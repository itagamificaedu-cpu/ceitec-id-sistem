<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪢 Cabo de Guerra — Batalha de Calculadoras</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #1a1a2e;
  height: 100vh; width: 100vw;
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* HEADER */
#header {
  background: linear-gradient(135deg,#0d0d0d,#1a1a2e);
  padding: 6px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid #FFD600;
  flex-shrink: 0;
}
.placar-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.08); border-radius:12px;
  padding:6px 16px; border:2px solid rgba(255,255,255,0.15);
  min-width: 100px;
}
.placar-label { color:#aaa; font-size:0.6rem; text-transform:uppercase; letter-spacing:1px; }
.placar-num { font-size:clamp(1.4rem,2.8vw,2.2rem); font-weight:900; }
.placar-num.azul     { color:#42A5F5; text-shadow:0 0 12px #42A5F5; }
.placar-num.vermelho { color:#EF5350; text-shadow:0 0 12px #EF5350; }

#timer-box {
  background:rgba(255,214,0,0.15); border:2px solid #FFD600;
  border-radius:12px; padding:5px 16px; text-align:center;
}
#timer-label { color:#aaa; font-size:0.6rem; text-transform:uppercase; letter-spacing:2px; }
#timer { font-size:clamp(1.6rem,3vw,2.2rem); font-weight:900; color:#FFD600; line-height:1; }
#timer.urgente { color:#EF5350; animation:pulsa 0.5s infinite; }
#rodada-info { color:#aaa; font-size:0.75rem; text-align:center; }
#rodada-info b { color:white; }
@keyframes pulsa { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

/* PROGRESS */
#progress-bar { height:4px; background:rgba(255,255,255,0.1); flex-shrink:0; }
#progress-fill { height:100%; background:linear-gradient(90deg,#FFD600,#FF8F00); transition:width 1s linear; }

/* PERGUNTA */
#pergunta-area {
  background:linear-gradient(135deg,#FFD600,#FF8F00);
  padding:7px 20px; text-align:center; flex-shrink:0;
  border-bottom:3px solid rgba(0,0,0,0.25);
}
#pergunta-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; color:rgba(0,0,0,0.45); font-weight:600; }
#pergunta-texto { font-size:clamp(2rem,5vw,3.2rem); font-weight:900; color:#1a1a2e; letter-spacing:2px; line-height:1.1; }

/* ARENA */
#arena {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1.2fr 1fr;
  min-height: 0;
}

/* PAINÉIS LATERAIS */
.painel {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:12px 10px; gap:8px;
}
.painel.azul     { background:linear-gradient(160deg,#0d47a1,#1565C0); }
.painel.vermelho { background:linear-gradient(160deg,#b71c1c,#C62828); }
.painel.brilho-azul     { background:linear-gradient(160deg,#1976D2,#42A5F5); }
.painel.brilho-vermelho { background:linear-gradient(160deg,#D32F2F,#EF5350); }

.nome-equipe {
  font-size:clamp(0.9rem,1.8vw,1.3rem); font-weight:900; color:white;
  text-shadow:0 2px 6px rgba(0,0,0,0.5); letter-spacing:1px; text-align:center;
}

/* DISPLAY CALCULADORA */
.calc-display {
  width:100%; max-width:210px;
  background:rgba(0,0,0,0.5); border-radius:10px;
  padding:8px 12px; text-align:right;
  border:2px solid rgba(255,255,255,0.2);
  min-height:44px; display:flex; align-items:center; justify-content:flex-end; gap:6px;
}
.calc-valor  { font-size:clamp(1.3rem,2.2vw,1.8rem); font-weight:900; color:white; }
.calc-status { font-size:1.1rem; min-width:24px; }
.calc-display.correto { border-color:#69F0AE !important; box-shadow:0 0 12px #69F0AE; }
.calc-display.errado  { border-color:#EF5350 !important; box-shadow:0 0 10px #EF5350; animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

/* GRID TECLADO */
.calc-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:5px; width:100%; max-width:210px;
}
.btn-num {
  background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.25);
  border-radius:9px; color:white;
  font-size:clamp(1rem,2vw,1.4rem); font-weight:800;
  cursor:pointer; aspect-ratio:1.15;
  transition:all 0.1s; touch-action:manipulation;
  display:flex; align-items:center; justify-content:center;
}
.btn-num:active, .btn-num.pressed { background:rgba(255,255,255,0.42); transform:scale(0.92); }
.btn-del { background:rgba(255,80,80,0.3); border-color:rgba(255,80,80,0.5); font-size:clamp(0.75rem,1.3vw,1rem); }

/* BOTÃO ENTER — menor, centralizado */
.btn-ok {
  grid-column: 1 / -1;
  background: #FFD600;
  border: 2px solid #e6b800;
  border-radius: 9px;
  color: #1a1a2e;
  font-size: clamp(0.8rem, 1.4vw, 1rem);
  font-weight: 900;
  cursor: pointer;
  padding: 7px 0;
  transition: all 0.1s;
  touch-action: manipulation;
  letter-spacing: 2px;
  width: 60%;
  justify-self: center;
}
.btn-ok:active, .btn-ok.pressed { background:#e6b800; transform:scale(0.96); }

/* CENTRO */
#centro {
  background:linear-gradient(180deg,#08081a,#10103a,#08081a);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-left:2px solid rgba(255,255,255,0.07);
  border-right:2px solid rgba(255,255,255,0.07);
  gap:4px; overflow:hidden; padding:6px 0;
}

/* SVG CENA PRINCIPAL */
#svg-cena {
  width: 100%;
  flex: 1;
  min-height: 0;
  overflow: visible;
  display: block;
}

/* PLACAR CENTRAL */
#placar-centro {
  background:rgba(0,0,0,0.6); border:2px solid rgba(255,214,0,0.5);
  border-radius:16px; padding:3px 16px;
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.pc-num { font-size:clamp(1.3rem,2.8vw,2rem); font-weight:900; }
.pc-num.az { color:#42A5F5; text-shadow:0 0 8px #42A5F5; }
.pc-num.vm { color:#EF5350; text-shadow:0 0 8px #EF5350; }
.pc-sep { color:#666; font-size:1.1rem; }

/* BARRA TENSÃO */
#barra-tensao {
  width:75%; max-width:160px; height:7px;
  background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; flex-shrink:0;
}
#tensao-fill { height:100%; border-radius:10px; transition:all .5s ease; }

/* FLASH */
.feedback-flash { position:fixed; inset:0; pointer-events:none; z-index:50; opacity:0; transition:opacity .15s; }
.feedback-flash.az-flash { background:radial-gradient(ellipse at 15% 50%,rgba(66,165,245,.35),transparent 60%); }
.feedback-flash.vm-flash { background:radial-gradient(ellipse at 85% 50%,rgba(239,83,80,.35),transparent 60%); }
.feedback-flash.show { opacity:1; }

/* MSG RODADA */
#msg-rodada {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:rgba(0,0,0,0.93); border:3px solid #FFD600;
  border-radius:20px; padding:18px 32px; text-align:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:all .3s cubic-bezier(.34,1.56,.64,1); max-width:88vw;
}
#msg-rodada.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
#msg-emoji  { font-size:2.8rem; display:block; margin-bottom:5px; }
#msg-titulo { font-size:clamp(1.1rem,2.8vw,1.7rem); font-weight:900; color:#FFD600; }
#msg-sub    { font-size:clamp(0.85rem,1.8vw,1rem); color:#aaa; margin-top:3px; }

/* FIM DE JOGO */
#fim-jogo {
  display:none; position:fixed; inset:0; z-index:200;
  flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;
}
#fim-jogo.az-win { background:linear-gradient(135deg,#0d47a1,#42A5F5); }
#fim-jogo.vm-win { background:linear-gradient(135deg,#b71c1c,#EF5350); }
#fim-jogo.empate { background:linear-gradient(135deg,#1a1a2e,#2d2d5e); }
#fim-jogo .trofeu { font-size:clamp(4rem,11vw,7rem); animation:pula .5s ease-in-out infinite alternate; }
#fim-jogo .nome-venc { font-size:clamp(1.8rem,5vw,3.5rem); font-weight:900; color:white; margin:8px 0; }
#fim-jogo .pf { font-size:clamp(1.1rem,2.5vw,1.8rem); color:rgba(255,255,255,.85); }
@keyframes pula { from{transform:translateY(0);} to{transform:translateY(-16px);} }
#btn-reiniciar {
  margin-top:18px; background:#FFD600; border:none; border-radius:14px;
  padding:12px 36px; font-size:clamp(1rem,2.2vw,1.3rem); font-weight:900;
  color:#1a1a2e; cursor:pointer; touch-action:manipulation;
}

/* badge */
.badge {
  position:fixed; font-size:clamp(.9rem,2vw,1.3rem); font-weight:900;
  background:#69F0AE; color:#1a1a2e; border-radius:10px; padding:6px 16px;
  z-index:60; pointer-events:none;
  animation:badge-up 1.2s ease-out forwards;
}
@keyframes badge-up { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-80px);} }
@keyframes ponto { 0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);} }
.ponto-anim { animation:ponto .5s ease-out; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="placar-box">
    <div>
      <div class="placar-label">Equipe 1</div>
      <div class="placar-num azul" id="pts1">0</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
    <div id="timer-box"><div id="timer-label">TEMPO</div><div id="timer">30</div></div>
    <div id="rodada-info">Rodada <b id="rodada-num">1</b>/10</div>
  </div>
  <div class="placar-box" style="justify-content:flex-end;">
    <div style="text-align:right;">
      <div class="placar-label">Equipe 2</div>
      <div class="placar-num vermelho" id="pts2">0</div>
    </div>
  </div>
</div>

<div id="progress-bar"><div id="progress-fill" style="width:100%"></div></div>

<!-- PERGUNTA -->
<div id="pergunta-area">
  <div id="pergunta-label">⚡ Responda primeiro e puxe a corda! ⚡</div>
  <div id="pergunta-texto">...</div>
</div>

<!-- ARENA -->
<div id="arena">

  <!-- CALC EQUIPE 1 -->
  <div class="painel azul" id="painel1">
    <div class="nome-equipe">🔵 EQUIPE 1</div>
    <div class="calc-display" id="display1">
      <span class="calc-status" id="status1"></span>
      <span class="calc-valor"  id="valor1">_</span>
    </div>
    <div class="calc-grid" id="grid1"></div>
  </div>

  <!-- CENTRO -->
  <div id="centro">

    <!-- SVG ÚNICO: bonecos + corda conectados -->
    <svg id="svg-cena" viewBox="0 0 300 220" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="gCorda" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#42A5F5"/>
          <stop offset="45%"  stop-color="#c8960a"/>
          <stop offset="100%" stop-color="#EF5350"/>
        </linearGradient>
        <!-- brilho no chão -->
        <linearGradient id="gChao" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#1a3a6b" stop-opacity="0.8"/>
          <stop offset="50%"  stop-color="#2a2a5a" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#6b1a1a" stop-opacity="0.8"/>
        </linearGradient>
        <filter id="sombra">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.5"/>
        </filter>
      </defs>

      <!-- Chão -->
      <rect x="0" y="195" width="300" height="6" fill="url(#gChao)" rx="3"/>

      <!-- ═══════════════════════════════
           BONECOS AZUIS (esquerda)
           Puxando para a ESQUERDA
           Mão direita segura a corda
      ═══════════════════════════════ -->

      <!-- Boneco Azul 1 (mais à esquerda, traseiro) -->
      <g id="b1c" filter="url(#sombra)" opacity="0.75">
        <!-- pernas -->
        <line x1="28" y1="155" x2="20" y2="190" stroke="#2196F3" stroke-width="4" stroke-linecap="round"/>
        <line x1="28" y1="155" x2="35" y2="190" stroke="#2196F3" stroke-width="4" stroke-linecap="round"/>
        <!-- corpo -->
        <line x1="28" y1="120" x2="28" y2="155" stroke="#2196F3" stroke-width="5" stroke-linecap="round"/>
        <!-- braço esquerdo (puxa para trás) -->
        <line x1="28" y1="132" x2="14" y2="126" stroke="#2196F3" stroke-width="4" stroke-linecap="round"/>
        <!-- braço direito (segura corda) -->
        <line x1="28" y1="132" x2="44" y2="140" stroke="#2196F3" stroke-width="4" stroke-linecap="round"/>
        <!-- cabeça -->
        <circle cx="28" cy="108" r="12" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
      </g>

      <!-- Boneco Azul 2 (meio) -->
      <g id="b1b" filter="url(#sombra)" opacity="0.88">
        <line x1="54" y1="152" x2="46" y2="190" stroke="#1E88E5" stroke-width="4" stroke-linecap="round"/>
        <line x1="54" y1="152" x2="62" y2="190" stroke="#1E88E5" stroke-width="4" stroke-linecap="round"/>
        <line x1="54" y1="116" x2="54" y2="152" stroke="#1E88E5" stroke-width="5" stroke-linecap="round"/>
        <line x1="54" y1="128" x2="38" y2="122" stroke="#1E88E5" stroke-width="4" stroke-linecap="round"/>
        <line x1="54" y1="128" x2="70" y2="137" stroke="#1E88E5" stroke-width="4" stroke-linecap="round"/>
        <circle cx="54" cy="104" r="12" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
      </g>

      <!-- Boneco Azul 3 (frente, segura corda) -->
      <g id="b1a" filter="url(#sombra)">
        <line x1="80" y1="148" x2="72" y2="190" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
        <line x1="80" y1="148" x2="90" y2="190" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
        <line x1="80" y1="110" x2="80" y2="148" stroke="#1565C0" stroke-width="6" stroke-linecap="round"/>
        <!-- braço esquerdo (puxa) -->
        <line x1="80" y1="124" x2="62" y2="118" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
        <!-- braço direito — esticado, segurando a corda -->
        <line x1="80" y1="124" x2="102" y2="130" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
        <!-- mão -->
        <circle cx="102" cy="130" r="5" fill="#FFD600" stroke="#CC8800" stroke-width="2"/>
        <circle cx="80" cy="96" r="14" fill="#42A5F5" stroke="#1565C0" stroke-width="2.5"/>
      </g>

      <!-- ═══════════════════════════════
           BONECOS VERMELHOS (direita)
           Espelhados, mão esquerda na corda
      ═══════════════════════════════ -->

      <!-- Boneco Vermelho 1 (mais à direita, traseiro) -->
      <g id="b2c" filter="url(#sombra)" opacity="0.75">
        <line x1="272" y1="155" x2="264" y2="190" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <line x1="272" y1="155" x2="280" y2="190" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <line x1="272" y1="120" x2="272" y2="155" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
        <line x1="272" y1="132" x2="286" y2="126" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <line x1="272" y1="132" x2="256" y2="140" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <circle cx="272" cy="108" r="12" fill="#EF5350" stroke="#b71c1c" stroke-width="2"/>
      </g>

      <!-- Boneco Vermelho 2 (meio) -->
      <g id="b2b" filter="url(#sombra)" opacity="0.88">
        <line x1="246" y1="152" x2="238" y2="190" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <line x1="246" y1="152" x2="254" y2="190" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <line x1="246" y1="116" x2="246" y2="152" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
        <line x1="246" y1="128" x2="262" y2="122" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <line x1="246" y1="128" x2="230" y2="137" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
        <circle cx="246" cy="104" r="12" fill="#EF5350" stroke="#b71c1c" stroke-width="2"/>
      </g>

      <!-- Boneco Vermelho 3 (frente, segura corda) -->
      <g id="b2a" filter="url(#sombra)">
        <line x1="220" y1="148" x2="210" y2="190" stroke="#C62828" stroke-width="5" stroke-linecap="round"/>
        <line x1="220" y1="148" x2="228" y2="190" stroke="#C62828" stroke-width="5" stroke-linecap="round"/>
        <line x1="220" y1="110" x2="220" y2="148" stroke="#C62828" stroke-width="6" stroke-linecap="round"/>
        <line x1="220" y1="124" x2="238" y2="118" stroke="#C62828" stroke-width="5" stroke-linecap="round"/>
        <!-- braço esquerdo esticado segurando corda -->
        <line x1="220" y1="124" x2="198" y2="130" stroke="#C62828" stroke-width="5" stroke-linecap="round"/>
        <!-- mão -->
        <circle cx="198" cy="130" r="5" fill="#FFD600" stroke="#CC8800" stroke-width="2"/>
        <circle cx="220" cy="96" r="14" fill="#EF5350" stroke="#C62828" stroke-width="2.5"/>
      </g>

      <!-- ═══════════════════════════════
           CORDA — conecta mão azul (102,130) à mão vermelha (198,130)
      ═══════════════════════════════ -->

      <!-- sombra da corda -->
      <path id="corda-sombra"
        d="M 102,133 C 130,145 170,145 198,133"
        stroke="rgba(0,0,0,0.35)" stroke-width="8" fill="none" stroke-linecap="round"/>

      <!-- corda principal -->
      <path id="corda-path"
        d="M 102,130 C 130,142 170,142 198,130"
        stroke="url(#gCorda)" stroke-width="6" fill="none" stroke-linecap="round"/>

      <!-- Nó central amarelo -->
      <circle id="no-corda" cx="150" cy="138" r="7" fill="#FFD600" stroke="#CC8800" stroke-width="2.5"/>

      <!-- Bandeira no nó -->
      <text id="bandeira-svg" x="150" y="128" text-anchor="middle" font-size="14">🚩</text>

      <!-- Linhas do chão (sombras dos pés) -->
      <ellipse cx="80"  cy="194" rx="22" ry="4" fill="rgba(0,0,0,0.3)"/>
      <ellipse cx="220" cy="194" rx="22" ry="4" fill="rgba(0,0,0,0.3)"/>

    </svg>

    <!-- Placar e barra -->
    <div id="placar-centro">
      <span class="pc-num az" id="pc1">0</span>
      <span class="pc-sep">×</span>
      <span class="pc-num vm" id="pc2">0</span>
    </div>
    <div id="barra-tensao">
      <div id="tensao-fill" style="width:0%;margin-left:50%;"></div>
    </div>

  </div><!-- /centro -->

  <!-- CALC EQUIPE 2 -->
  <div class="painel vermelho" id="painel2">
    <div class="nome-equipe">🔴 EQUIPE 2</div>
    <div class="calc-display" id="display2">
      <span class="calc-status" id="status2"></span>
      <span class="calc-valor"  id="valor2">_</span>
    </div>
    <div class="calc-grid" id="grid2"></div>
  </div>

</div><!-- /arena -->

<div class="feedback-flash" id="flash"></div>

<div id="msg-rodada">
  <span id="msg-emoji">🎉</span>
  <div id="msg-titulo">Equipe 1 acertou!</div>
  <div id="msg-sub">Próxima pergunta em 2s...</div>
</div>

<div id="fim-jogo">
  <div class="trofeu"    id="trofeu">🏆</div>
  <div class="nome-venc" id="nome-venc">Equipe 1 Venceu!</div>
  <div class="pf"        id="pf-placar">5 × 3</div>
  <button id="btn-reiniciar" onclick="reiniciar()">🔄 Jogar Novamente</button>
</div>

<script>
const TOTAL = 10, TEMPO = 30, PAUSA = 2300;
let p1=0, p2=0, rod=1, resp=0, tiv=null, t=TEMPO, ativo=true, e1='', e2='';
let actx=null;

function AC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(freqs,type='sine'){try{const c=AC();freqs.forEach(([f,s,d])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(f,c.currentTime+s);g.gain.setValueAtTime(.28,c.currentTime+s);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+s+d);o.start(c.currentTime+s);o.stop(c.currentTime+s+d);});}catch(e){}}
function somAcerto(){beep([[523,0,.25],[659,.1,.25],[784,.2,.25],[1047,.3,.3]]);}
function somErro(){beep([[200,0,.15],[120,.1,.2]],'sawtooth');}
function somTic(){beep([[800,0,.05]],'square');}
function somFim(){beep([[523,0,.4],[587,.08,.4],[659,.16,.4],[698,.24,.4],[784,.32,.4],[880,.4,.4],[1047,.5,.5]]);}

function gerarQ(){
  const t=Math.floor(Math.random()*3);let a,b,r,txt;
  if(t===0){a=Math.floor(Math.random()*50)+5;b=Math.floor(Math.random()*50)+5;r=a+b;txt=`${a} + ${b} = ?`;}
  else if(t===1){a=Math.floor(Math.random()*40)+20;b=Math.floor(Math.random()*(a-1))+1;r=a-b;txt=`${a} − ${b} = ?`;}
  else{const f=[[2,3],[2,4],[2,5],[3,3],[3,4],[3,5],[4,4],[4,5],[5,5],[2,6],[2,7],[3,6],[4,6],[5,6],[6,6],[2,8],[3,7]];const[fa,fb]=f[Math.floor(Math.random()*f.length)];r=fa*fb;txt=`${fa} × ${fb} = ?`;}
  return{txt,r};
}

function criarCalc(id,eq){
  const g=document.getElementById(id);g.innerHTML='';
  ['7','8','9','4','5','6','1','2','3','⌫','0','✓'].forEach(n=>{
    const b=document.createElement('button');
    const isOk=n==='✓',isDel=n==='⌫';
    b.className='btn-num'+(isDel?' btn-del':'')+(isOk?' btn-ok':'');
    if(isOk)b.style.gridColumn='1/-1';
    b.textContent=isOk?'↵ ENTER':n;
    b.addEventListener('pointerdown',e=>{e.preventDefault();b.classList.add('pressed');setTimeout(()=>b.classList.remove('pressed'),100);inp(eq,n);});
    g.appendChild(b);
  });
}

function inp(eq,v){
  if(!ativo)return; somTic();
  if(eq===1){
    if(v==='⌫')e1=e1.slice(0,-1);
    else if(v==='✓')ok(1);
    else if(e1.length<5)e1+=v;
    document.getElementById('valor1').textContent=e1||'_';
  }else{
    if(v==='⌫')e2=e2.slice(0,-1);
    else if(v==='✓')ok(2);
    else if(e2.length<5)e2+=v;
    document.getElementById('valor2').textContent=e2||'_';
  }
}

function ok(eq){
  if(!ativo)return;
  const val=parseInt(eq===1?e1:e2);
  const disp=document.getElementById(`display${eq}`);
  const stat=document.getElementById(`status${eq}`);
  if(isNaN(val))return;
  if(val===resp){
    ativo=false; clearInterval(tiv); somAcerto();
    if(eq===1)p1++;else p2++;
    disp.classList.add('correto'); stat.textContent='✅';
    const fl=document.getElementById('flash');
    fl.className=`feedback-flash ${eq===1?'az-flash':'vm-flash'} show`;
    setTimeout(()=>fl.className='feedback-flash',700);
    document.getElementById(`painel${eq}`).classList.add(eq===1?'brilho-azul':'brilho-vermelho');
    // badge
    const b=document.createElement('div');b.className='badge';
    b.textContent=eq===1?'🔵 +1 PONTO!':'🔴 +1 PONTO!';
    b.style.cssText=`top:45%;left:${eq===1?'6%':'55%'};color:${eq===1?'#1565C0':'#C62828'};`;
    document.body.appendChild(b);setTimeout(()=>b.remove(),1300);
    atualizarPlacar(); atualizarCorda(eq);
    showMsg('🎉',`${eq===1?'🔵 Equipe 1':'🔴 Equipe 2'} acertou!`,'Próxima pergunta em 2s...');
    setTimeout(()=>proxRodada(),PAUSA);
  }else{
    somErro(); disp.classList.add('errado'); stat.textContent='❌';
    setTimeout(()=>{disp.classList.remove('errado');stat.textContent='';},600);
    if(eq===1)e1='';else e2='';
    document.getElementById(`valor${eq}`).textContent='_';
  }
}

function atualizarPlacar(){
  ['pts1','pc1'].forEach(id=>{const el=document.getElementById(id);el.textContent=p1;el.classList.remove('ponto-anim');void el.offsetWidth;el.classList.add('ponto-anim');});
  ['pts2','pc2'].forEach(id=>{const el=document.getElementById(id);el.textContent=p2;el.classList.remove('ponto-anim');void el.offsetWidth;el.classList.add('ponto-anim');});
}

function atualizarCorda(venc){
  const diff=p1-p2, MAX=5;
  const off=Math.max(-MAX,Math.min(MAX,diff));
  // deslocamento do nó central
  const noX=150+off*-10;
  const sag=142+Math.abs(off)*2;
  // A corda vai de mão azul (102,130) a mão vermelha (198,130)
  // quando azul puxa, curva vai para esquerda
  const cx=noX;
  document.getElementById('corda-path').setAttribute('d',`M 102,130 Q ${cx},${sag} 198,130`);
  document.getElementById('corda-sombra').setAttribute('d',`M 102,134 Q ${cx},${sag+5} 198,134`);
  document.getElementById('no-corda').setAttribute('cx',noX);
  document.getElementById('no-corda').setAttribute('cy',sag-2);
  document.getElementById('bandeira-svg').setAttribute('x',noX);
  document.getElementById('bandeira-svg').setAttribute('y',sag-12);
  // barra
  const fill=document.getElementById('tensao-fill');
  const w=Math.abs(off)/MAX*50;
  if(off>0){fill.style.cssText=`width:${w}%;margin-left:50%;background:linear-gradient(90deg,#FFD600,#42A5F5);`;}
  else if(off<0){fill.style.cssText=`width:${w}%;margin-left:${50-w}%;background:linear-gradient(90deg,#EF5350,#FFD600);`;}
  else{fill.style.cssText='width:0%;margin-left:50%;';}
  // anima bonecos da equipe vencedora
  if(venc){
    const grupo = venc===1 ? ['b1a','b1b','b1c'] : ['b2a','b2b','b2c'];
    grupo.forEach((id,i)=>{
      const el=document.getElementById(id);
      if(!el)return;
      setTimeout(()=>{
        const orig=el.getAttribute('transform')||'';
        el.setAttribute('transform',venc===1?'translate(-6,0)':'translate(6,0)');
        setTimeout(()=>el.removeAttribute('transform'),400);
      },i*100);
    });
  }
}

function iniciarTimer(){
  t=TEMPO; clearInterval(tiv);
  const prog=document.getElementById('progress-fill');
  const tmr=document.getElementById('timer');
  tiv=setInterval(()=>{
    t--; tmr.textContent=t;
    prog.style.width=`${(t/TEMPO)*100}%`;
    if(t<=5){tmr.classList.add('urgente');if(t>0)somTic();}
    else tmr.classList.remove('urgente');
    if(t<=0){clearInterval(tiv);if(ativo){ativo=false;showMsg('⏰','Tempo esgotado!','Ninguém pontuou...');setTimeout(()=>proxRodada(),PAUSA);}}
  },1000);
}

function proxRodada(){
  hideMsg();
  document.getElementById('painel1').className='painel azul';
  document.getElementById('painel2').className='painel vermelho';
  ['display1','display2'].forEach(id=>document.getElementById(id).className='calc-display');
  ['status1','status2'].forEach(id=>document.getElementById(id).textContent='');
  e1='';e2='';
  document.getElementById('valor1').textContent='_';
  document.getElementById('valor2').textContent='_';
  if(rod>=TOTAL){fimJogo();return;}
  rod++; document.getElementById('rodada-num').textContent=rod;
  novaQ(); ativo=true; iniciarTimer();
}

function novaQ(){
  const{txt,r}=gerarQ(); resp=r;
  const el=document.getElementById('pergunta-texto');
  el.style.cssText='transition:none;transform:scale(0.8);opacity:0;';
  el.textContent=txt;
  requestAnimationFrame(()=>{el.style.cssText='transition:all .3s cubic-bezier(.34,1.56,.64,1);transform:scale(1);opacity:1;';});
}

function showMsg(em,ti,sb){
  document.getElementById('msg-emoji').textContent=em;
  document.getElementById('msg-titulo').textContent=ti;
  document.getElementById('msg-sub').textContent=sb;
  document.getElementById('msg-rodada').classList.add('show');
}
function hideMsg(){document.getElementById('msg-rodada').classList.remove('show');}

function fimJogo(){
  clearInterval(tiv); somFim();
  const fim=document.getElementById('fim-jogo');
  let cls,tr,nm;
  if(p1>p2){cls='az-win';tr='🏆';nm='🔵 EQUIPE 1 VENCEU!';}
  else if(p2>p1){cls='vm-win';tr='🏆';nm='🔴 EQUIPE 2 VENCEU!';}
  else{cls='empate';tr='🤝';nm='EMPATE!';}
  fim.className=cls; fim.style.display='flex';
  document.getElementById('trofeu').textContent=tr;
  document.getElementById('nome-venc').textContent=nm;
  document.getElementById('pf-placar').textContent=`Placar Final: ${p1} × ${p2}`;
}

function reiniciar(){
  p1=0;p2=0;rod=1;e1='';e2='';
  document.getElementById('fim-jogo').style.display='none';
  document.getElementById('rodada-num').textContent='1';
  ['painel1','painel2'].forEach((id,i)=>document.getElementById(id).className=`painel ${i===0?'azul':'vermelho'}`);
  document.getElementById('timer').classList.remove('urgente');
  // reset corda
  document.getElementById('corda-path').setAttribute('d','M 102,130 Q 150,142 198,130');
  document.getElementById('corda-sombra').setAttribute('d','M 102,134 Q 150,147 198,134');
  document.getElementById('no-corda').setAttribute('cx','150');
  document.getElementById('no-corda').setAttribute('cy','136');
  document.getElementById('bandeira-svg').setAttribute('x','150');
  document.getElementById('bandeira-svg').setAttribute('y','126');
  document.getElementById('tensao-fill').style.cssText='width:0%;margin-left:50%;';
  ['display1','display2'].forEach(id=>document.getElementById(id).className='calc-display');
  ['status1','status2'].forEach(id=>document.getElementById(id).textContent='');
  atualizarPlacar(); novaQ(); ativo=true; iniciarTimer();
}

document.addEventListener('pointerdown',()=>{try{AC().resume();}catch(e){}},{once:false});
criarCalc('grid1',1); criarCalc('grid2',2);
novaQ(); atualizarPlacar(); iniciarTimer();
</script>
