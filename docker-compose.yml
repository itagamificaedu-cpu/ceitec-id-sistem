version: '3.9'

services:
  # ── Banco de dados PostgreSQL ──────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ita_tecnologia}
      POSTGRES_USER: ${POSTGRES_USER:-ita_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ita_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django (GamificaEdu + Corretor) ───────────────────────────
  django:
    build:
      context: ./plataforma
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ita_user}:${POSTGRES_PASSWORD:-senha_forte}@db:5432/${POSTGRES_DB:-ita_tecnologia}
      DJANGO_SETTINGS_MODULE: ita_tecnologia.settings
      DEBUG: "False"
    volumes:
      - django_media:/app/media
      - django_static:/app/staticfiles
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn ita_tecnologia.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  # ── Node.js (QR Code, Presença, IA, ItagGame) ─────────────────
  node:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - node_uploads:/app/uploads
      - node_db:/app/database.sqlite
    ports:
      - "3001:3001"

  # ── React (Portal Central) ─────────────────────────────────────
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"

  # ── Nginx (Proxy Reverso) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - django
      - node
      - react
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - django_static:/var/www/static:ro
      - django_media:/var/www/media:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  django_media:
  django_static:
  node_uploads:
  node_db:
