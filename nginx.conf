events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream django_backend {
        server django:8000;
    }

    upstream node_backend {
        server node:3001;
    }

    upstream react_frontend {
        server react:80;
    }

    server {
        listen 80;
        server_name itatecnologiaeducacional.tech 2.24.73.137 localhost;

        # Arquivos estáticos Django
        location /static/ {
            alias /var/www/static/;
        }

        location /media/ {
            alias /var/www/media/;
        }

        # Admin Django
        location /django-admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Portal Django (GamificaEdu, Corretor, templates)
        location ~ ^/(dashboard|accounts|ferramentas|gamification|corretor|assinar|webhook|itagame|relatorios|gestao-professores|django-admin)/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API Django (JWT, REST)
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # API Node.js (QR Code, Presença, IA Node, ItagGame)
        location /node-api/ {
            rewrite ^/node-api/(.*) /api/$1 break;
            proxy_pass http://node_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # React (portal principal — tudo o mais)
        location / {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SPA: fallback para index.html
            proxy_intercept_errors on;
            error_page 404 = @react_fallback;
        }

        location @react_fallback {
            proxy_pass http://react_frontend;
        }
    }
}
