events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # DNS interno do Docker — re-resolve automaticamente quando containers reiniciam
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Redireciona HTTP → HTTPS (CEITEC)
    server {
        listen 80;
        server_name itatecnologiaeducacional.tech 2.24.73.137 localhost;
        return 301 https://itatecnologiaeducacional.tech$request_uri;
    }

    # Redireciona HTTP → HTTPS (VivIModa)
    server {
        listen 80;
        server_name vivimoda.itatecnologiaeducacional.tech;
        return 301 https://vivimoda.itatecnologiaeducacional.tech$request_uri;
    }

    server {
        listen 443 ssl;
        server_name itatecnologiaeducacional.tech;

        ssl_certificate     /etc/letsencrypt/live/itatecnologiaeducacional.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/itatecnologiaeducacional.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        client_max_body_size 100M;

        # Arquivos estáticos Django
        location /static/ {
            alias /var/www/static/;
        }

        location /media/ {
            alias /var/www/media/;
        }

        # Admin Django
        location /django-admin/ {
            set $upstream_django http://django:8000;
            proxy_pass $upstream_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Página pública do aluno ItagGame (sem login)
        location = /itagame/aluno {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Redireciona /inscricao sem barra para /inscricao/
        location = /inscricao {
            return 301 /inscricao/;
        }

        # Rotas do React — DEVEM ficar ANTES do bloco Django
        # Lista de quizzes
        location = /quiz {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # Criar novo quiz
        location = /quiz/novo {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # Editar, host e ranking do quiz
        location ~ ^/quiz/[0-9]+/(host|editar|ranking)(/.*)?$ {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = @react_fallback;
        }
        # Cubo Mágico
        location = /cubo-magico {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # Rotas React que começam com prefixos também usados no Django
        location ~ ^/(itagame|relatorios|desempenho|scanner|turmas|professores|alunos|avaliacoes|ocorrencias|dashboard|liga-jovem|album|scanner-portal|cubo-magico|planos|minha-licenca)(/.*)?$ {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = @react_fallback;
        }

        # Portal Django
        location ~ ^/(accounts|ferramentas|gamification|corretor|assinar|webhook|itagame|relatorios|pedagogico|gestao-professores|quiz|login|logout|portal|master|ita|escola|sem-acesso|inscricao|desafio)/ {
            set $upstream_django http://django:8000;
            proxy_pass $upstream_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API Django
        location /api/ {
            set $upstream_django http://django:8000;
            proxy_pass $upstream_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Socket.io — WebSocket para quiz ao vivo
        location /socket.io/ {
            set $upstream_node http://node:3001;
            proxy_pass $upstream_node;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        # API Node.js
        location /node-api/ {
            set $upstream_node http://node:3001;
            rewrite ^/node-api/(.*) /api/$1 break;
            proxy_pass $upstream_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Copa do Saber — jogo de quiz HTML/CSS/JS (arquivo estático)
        location /quiz-copa/ {
            alias /var/www/quiz-copa/;
            index index.html;
            try_files $uri $uri/ /quiz-copa/index.html;
        }

        # PWA do Aluno — Mobile Tracker (arquivos estáticos servidos pelo Node)
        location /pwa/ {
            set $upstream_node http://node:3001;
            proxy_pass $upstream_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Mestre da Escola — Next.js rodando em /mestre
        location /mestre {
            set $upstream_mestre http://mestre:3002;
            proxy_pass $upstream_mestre;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # React SPA
        location / {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = @react_fallback;
        }

        location @react_fallback {
            set $upstream_react http://react:80;
            proxy_pass $upstream_react;
        }
    }

    # ─── ViviBoutique — porta 8011 ───────────────────────────────────────────
    server {
        listen 80;
        server_name viviboutique.itatecnologiaeducacional.tech;
        return 301 https://viviboutique.itatecnologiaeducacional.tech$request_uri;
    }
    server {
        listen 443 ssl;
        server_name viviboutique.itatecnologiaeducacional.tech;
        ssl_certificate     /etc/letsencrypt/live/viviboutique.itatecnologiaeducacional.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/viviboutique.itatecnologiaeducacional.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 100M;
        location /static/ { proxy_pass http://172.17.0.1:8011/static/; proxy_set_header Host $host; }
        location /media/  { proxy_pass http://172.17.0.1:8011/media/;  proxy_set_header Host $host; }
        location / {
            proxy_pass http://172.17.0.1:8011;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # ─── PalomaAroma — porta 8012 ────────────────────────────────────────────
    server {
        listen 80;
        server_name palomaaroma.itatecnologiaeducacional.tech;
        return 301 https://palomaaroma.itatecnologiaeducacional.tech$request_uri;
    }
    server {
        listen 443 ssl;
        server_name palomaaroma.itatecnologiaeducacional.tech;
        ssl_certificate     /etc/letsencrypt/live/palomaaroma.itatecnologiaeducacional.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/palomaaroma.itatecnologiaeducacional.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        client_max_body_size 100M;
        location /static/ { proxy_pass http://172.17.0.1:8012/static/; proxy_set_header Host $host; }
        location /media/  { proxy_pass http://172.17.0.1:8012/media/;  proxy_set_header Host $host; }
        location / {
            proxy_pass http://172.17.0.1:8012;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # ─── VivIModa — Sistema de Gestão de Confecções ──────────────────────────
    server {
        listen 443 ssl;
        server_name vivimoda.itatecnologiaeducacional.tech;

        ssl_certificate     /etc/letsencrypt/live/vivimoda.itatecnologiaeducacional.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vivimoda.itatecnologiaeducacional.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 100M;

        # Arquivos estáticos do Django (coletados pelo collectstatic)
        location /static/ {
            proxy_pass http://172.17.0.1:8010/static/;
            proxy_set_header Host $host;
        }

        # Arquivos de mídia (uploads da loja)
        location /media/ {
            proxy_pass http://172.17.0.1:8010/media/;
            proxy_set_header Host $host;
        }

        # Tudo o mais vai para o Django via porta 8010
        location / {
            proxy_pass http://172.17.0.1:8010;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
