{% extends 'base.html' %}

{% block login_content %}
<div class="login-page">
    <div class="card login-card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fas fa-graduation-cap fa-4x" style="color: #1a237e;"></i>
                <h3 class="mt-3 fw-bold">Correção Online</h3>
                <p class="text-muted">Sistema de Correção Automática de Provas</p>
            </div>
            
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" id="id_username" placeholder="Digite seu usuário" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="id_password" class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" id="id_password" placeholder="Digite sua senha" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p class="mb-0">Não tem conta? <a href="{% url 'registro' %}" class="text-decoration-none">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
