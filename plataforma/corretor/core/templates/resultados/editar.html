{% extends 'base.html' %}

{% block title %}Editar Resultado - Correção Online{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'lista_resultados' %}" class="btn btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h2 class="fw-bold mb-0">Editar Resultado</h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4 text-center">
                        <div class="small text-muted mb-1">PROVA:</div>
                        <h4 class="fw-bold">{{ resultado.avaliacao.titulo }}</h4>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Aluno</label>
                        <input type="text" name="aluno_nome" class="form-control form-control-lg" value="{{ resultado.aluno_nome }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Turma</label>
                        <input type="text" name="turma" class="form-control" value="{{ resultado.turma }}">
                    </div>

                    <hr class="my-4">

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Nota Final</label>
                            <input type="text" name="nota" class="form-control form-control-lg text-center" value="{{ resultado.nota }}" step="0.1">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Acertos</label>
                            <input type="number" name="acertos" class="form-control form-control-lg text-center text-success fw-bold" value="{{ resultado.acertos }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Erros</label>
                            <input type="number" name="erros" class="form-control form-control-lg text-center text-danger fw-bold" value="{{ resultado.erros }}">
                        </div>
                    </div>

                    <div class="mt-5">
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-save me-2"></i> SALVAR ALTERAÇÕES
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
